<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Tour Builder</title>
<script src="./react.production.min.js"></script>
<script src="./react-dom.production.min.js"></script>
<script src="./babel.min.js"></script>
<script src="./tokens.js"></script>
<script src="./data.js"></script>
<script src="./market.js"></script>
<style>
  *{box-sizing:border-box}
  body{margin:0;background:#f0efed;font-family:'Helvetica Neue',Helvetica,'Segoe UI',system-ui,-apple-system,Arial,sans-serif;font-size:13px;color:#1c1917}
  input,select,button{font-family:inherit}
  input:focus,select:focus{outline:1px solid #97C459}
  ::-webkit-scrollbar{width:9px;height:9px}
  ::-webkit-scrollbar-thumb{background:#d6d3d1;border-radius:5px}
  @keyframes toastIn{from{opacity:0;transform:translate(-50%,10px)}to{opacity:1;transform:translate(-50%,0)}}
  @keyframes spin{to{transform:rotate(360deg)}}
  @keyframes miInsightFadeIn{from{opacity:0}to{opacity:1}}
  .ca-source-info-btn{opacity:0;color:#a8a29e;cursor:pointer;transition:opacity .12s,color .12s}
  .ca-source-chip-wrap:hover .ca-source-info-btn{opacity:1}
  .ca-source-info-btn:hover{color:#57534e}
  .ca-source-info-btn.is-open{opacity:1}
  .ca-spinner{display:inline-block;width:12px;height:12px;border:2px solid rgba(255,255,255,.4);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite}
</style>
</head>
<body>
<div id="root" style="padding:0;display:flex"></div>

<script type="text/babel" data-presets="react">
const { useState, useEffect, useRef, useMemo } = React;

const ACCENT  = '#1D9E75';
const GREEN   = '#639922';
const TINT    = '#EAF3DE';

const STATE_COL = {
  WA:{bg:'#FEF3C7',tx:'#92400E',bd:'#FDE68A'}, QLD:{bg:'#DBEAFE',tx:'#1E40AF',bd:'#BFDBFE'},
  NSW:{bg:'#DCFCE7',tx:'#166534',bd:'#BBF7D0'}, VIC:{bg:'#EDE9FE',tx:'#5B21B6',bd:'#DDD6FE'},
  TAS:{bg:'#ECFDF5',tx:'#065F46',bd:'#A7F3D0'}, NT:{bg:'#FFEDD5',tx:'#9A3412',bd:'#FED7AA'},
  SA:{bg:'#FCE7F3',tx:'#9D174D',bd:'#FBCFE8'}, ACT:{bg:'#E0F2FE',tx:'#075985',bd:'#BAE6FD'},
};
function stateChipStyle(s, small){
  const c = STATE_COL[s] || {bg:'#f5f5f4',tx:'#57534e',bd:'#e7e5e4'};
  return {display:'inline-flex',alignItems:'center',padding:small?'1px 6px':'2px 8px',borderRadius:'4px',
    fontSize:small?'10px':'11px',fontWeight:700,background:c.bg,color:c.tx,border:'0.5px solid '+c.bd,whiteSpace:'nowrap'};
}

// ════════════════════════════════════════════════════════════
// Analytics view — pure CSS charts, no external library
// ════════════════════════════════════════════════════════════

function HBar({items, title, colorFn, labelWidth, note}){
  labelWidth = labelWidth || 160;
  const max = Math.max(...items.map(x=>x.v), 1);
  return (
    <div style={{background:'#fff',border:'0.5px solid #e7e5e4',borderRadius:'8px',padding:'14px 16px',minWidth:0}}>
      <div style={{fontSize:'11px',fontWeight:700,color:'#57534e',textTransform:'uppercase',letterSpacing:'.04em',marginBottom:'10px'}}>{title}</div>
      {note && <div style={{fontSize:'10px',color:'#a8a29e',marginBottom:'8px'}}>{note}</div>}
      <div style={{display:'flex',flexDirection:'column',gap:'5px'}}>
        {items.map((x,i)=>{
          const pct = Math.round(x.v/max*100);
          const col = colorFn ? colorFn(x) : '#1D9E75';
          return (
            <div key={i} style={{display:'flex',alignItems:'center',gap:'8px',fontSize:'11px'}}>
              <div style={{width:labelWidth,minWidth:labelWidth,textAlign:'right',color:'#57534e',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',flexShrink:0}} title={x.label}>{x.label}</div>
              <div style={{flex:1,height:'16px',background:'#f0efed',borderRadius:'3px',overflow:'hidden'}}>
                <div style={{height:'100%',width:pct+'%',background:col,borderRadius:'3px',transition:'width .3s'}}/>
              </div>
              <div style={{width:'32px',textAlign:'right',fontWeight:600,color:'#1c1917',flexShrink:0}}>{x.v}</div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

function GroupedHBar({items, title, keys, colors, labelWidth, note}){
  // items: [{label, [key]: value}], keys: ['A','B'], colors: {A:'#...', B:'#...'}
  labelWidth = labelWidth || 140;
  const max = Math.max(...items.flatMap(x=>keys.map(k=>x[k]||0)), 1);
  return (
    <div style={{background:'#fff',border:'0.5px solid #e7e5e4',borderRadius:'8px',padding:'14px 16px',minWidth:0}}>
      <div style={{fontSize:'11px',fontWeight:700,color:'#57534e',textTransform:'uppercase',letterSpacing:'.04em',marginBottom:'4px'}}>{title}</div>
      {note && <div style={{fontSize:'10px',color:'#a8a29e',marginBottom:'4px'}}>{note}</div>}
      <div style={{display:'flex',gap:'12px',marginBottom:'8px'}}>
        {keys.map(k=><div key={k} style={{display:'flex',alignItems:'center',gap:'4px',fontSize:'10px',color:'#57534e'}}><div style={{width:'10px',height:'10px',borderRadius:'2px',background:colors[k]}}/>{k}</div>)}
      </div>
      <div style={{display:'flex',flexDirection:'column',gap:'6px'}}>
        {items.map((x,i)=>(
          <div key={i} style={{display:'flex',alignItems:'center',gap:'8px',fontSize:'11px'}}>
            <div style={{width:labelWidth,minWidth:labelWidth,textAlign:'right',color:'#57534e',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',flexShrink:0}}>{x.label}</div>
            <div style={{flex:1,display:'flex',flexDirection:'column',gap:'2px'}}>
              {keys.map(k=>(
                <div key={k} style={{display:'flex',alignItems:'center',gap:'4px'}}>
                  <div style={{flex:1,height:'10px',background:'#f0efed',borderRadius:'2px',overflow:'hidden'}}>
                    <div style={{height:'100%',width:Math.round((x[k]||0)/max*100)+'%',background:colors[k],borderRadius:'2px'}}/>
                  </div>
                  <div style={{width:'28px',textAlign:'right',fontSize:'10px',color:'#57534e'}}>{x[k]||0}</div>
                </div>
              ))}
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

function AnalyticsView({catalog, THEMES}){
  const stats = useMemo(()=>{
    const allRows = Object.values(catalog).flatMap(s=>s.allRows||[]);
    const allTpls = Object.values(catalog).flatMap(s=>s.templates||[]);

    // de-duplicate tours by url+source (allRows has one row per day)
    const tourMap = new Map();
    allRows.forEach(r=>{ const k=r.url||r.tour; if(!tourMap.has(k)) tourMap.set(k,r); });
    const tours = [...tourMap.values()];

    // headline
    const totalDayRows = allRows.length;
    const totalTours   = tours.length;
    const uniqueSources = new Set(tours.map(t=>t.source)).size;
    const uniqueCities  = new Set(allRows.map(r=>r.city).filter(Boolean)).size;

    // tours by source (colored by type)
    const srcMap = new Map();
    tours.forEach(t=>{
      if(!srcMap.has(t.source)) srcMap.set(t.source,{v:0,type:t.type});
      srcMap.get(t.source).v++;
    });
    const bySource = [...srcMap.entries()].map(([label,x])=>({label,v:x.v,type:x.type})).sort((a,b)=>b.v-a.v);

    // tours by market
    const mktMap = new Map();
    tours.forEach(t=>{ const m=t.sourceLocation||'Unknown'; mktMap.set(m,(mktMap.get(m)||0)+1); });
    const byMarket = [...mktMap.entries()].map(([label,v])=>({label,v})).sort((a,b)=>b.v-a.v);

    // competitor vs board
    const compCount  = tours.filter(t=>t.type==='Competitor').length;
    const boardCount = tours.filter(t=>t.type==='Board').length;

    // tours per state
    const stateMap = new Map();
    Object.entries(catalog).forEach(([abbr, sd])=>{
      const stateUrls = new Set((sd.allRows||[]).map(r=>r.url||r.tour));
      stateMap.set(abbr, stateUrls.size);
    });
    const byState = [...stateMap.entries()].map(([label,v])=>({label,v})).sort((a,b)=>b.v-a.v);

    // comp vs board per state
    const stateCompBoard = Object.entries(catalog).map(([abbr,sd])=>{
      const stateRows = sd.allRows||[];
      const seen = new Map();
      stateRows.forEach(r=>{ const k=r.url||r.tour; if(!seen.has(k)) seen.set(k,r.type); });
      let comp=0,board=0;
      seen.forEach(t=>{ if(t==='Competitor') comp++; else board++; });
      return {label:abbr, Competitor:comp, Board:board};
    }).sort((a,b)=>(b.Competitor+b.Board)-(a.Competitor+a.Board));

    // top 20 cities by day-visits
    const cityCount = new Map();
    allRows.forEach(r=>{ if(r.city) cityCount.set(r.city,(cityCount.get(r.city)||0)+1); });
    const topCities = [...cityCount.entries()].map(([label,v])=>({label,v})).sort((a,b)=>b.v-a.v).slice(0,20);

    // theme frequency
    const themeCount = new Map();
    allRows.forEach(r=>{
      if(r.themes)(r.themes.split(',').map(t=>t.trim()).filter(Boolean)).forEach(t=>themeCount.set(t,(themeCount.get(t)||0)+1));
    });
    allTpls.forEach(t=>(t.themes||[]).forEach(th=>themeCount.set(th,(themeCount.get(th)||0)+1)));
    const byTheme = [...themeCount.entries()].map(([label,v])=>({label,v})).sort((a,b)=>b.v-a.v).slice(0,15);

    // duration distribution (from templates — have days[])
    const buckets = [
      {label:'1–5 days', min:1, max:5, Competitor:0, Board:0},
      {label:'6–7 days', min:6, max:7, Competitor:0, Board:0},
      {label:'8–10 days', min:8, max:10, Competitor:0, Board:0},
      {label:'11–14 days', min:11, max:14, Competitor:0, Board:0},
      {label:'15+ days', min:15, max:999, Competitor:0, Board:0},
    ];
    allTpls.forEach(t=>{
      const d=(t.days||[]).length||1;
      const b=buckets.find(b=>d>=b.min&&d<=b.max);
      if(b) b[t.type==='Competitor'?'Competitor':'Board']++;
    });

    return {totalDayRows,totalTours,uniqueSources,uniqueCities,bySource,byMarket,compCount,boardCount,byState,topCities,byTheme,buckets,stateCompBoard};
  }, [catalog]);

  const COMP_COL  = '#E8732A';
  const BOARD_COL = '#1D9E75';
  const MKT_COLORS = ['#185FA5','#1D9E75','#E8732A','#9333EA','#0D9488','#DC2626','#F59E0B'];

  const secHead = (txt,sub) => (
    <div style={{marginBottom:'12px',marginTop:'4px'}}>
      <div style={{fontSize:'13px',fontWeight:700,color:'#1c1917'}}>{txt}</div>
      {sub && <div style={{fontSize:'11px',color:'#a8a29e',marginTop:'2px'}}>{sub}</div>}
    </div>
  );

  return (
    <div style={{padding:'18px 20px',display:'flex',flexDirection:'column',gap:'20px',maxWidth:'1200px'}}>

      {/* ── Headline metrics ── */}
      {secHead('Dataset Overview', 'Across all states currently loaded')}
      <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:'10px'}}>
        {[
          ['Total Tours', stats.totalTours, 'unique itineraries'],
          ['Day-Rows', stats.totalDayRows, 'individual day entries'],
          ['Sources', stats.uniqueSources, 'operators & boards'],
          ['Cities', stats.uniqueCities, 'distinct cities covered'],
        ].map(([label,num,sub])=>(
          <div key={label} style={{background:'#fff',border:'0.5px solid #e7e5e4',borderRadius:'8px',padding:'14px 16px'}}>
            <div style={{fontSize:'10px',color:'#57534e',textTransform:'uppercase',letterSpacing:'.04em',marginBottom:'4px'}}>{label}</div>
            <div style={{fontSize:'26px',fontWeight:700,color:'#1c1917'}}>{num.toLocaleString()}</div>
            <div style={{fontSize:'10px',color:'#a8a29e',marginTop:'2px'}}>{sub}</div>
          </div>
        ))}
      </div>

      {/* ── Competitor vs Board ── */}
      {secHead('Competitor vs Board', 'Operators we compete with vs tourism boards')}
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'12px'}}>
        <div style={{background:'#fff',border:'0.5px solid #e7e5e4',borderRadius:'8px',padding:'16px'}}>
          <div style={{fontSize:'11px',fontWeight:700,color:'#57534e',textTransform:'uppercase',letterSpacing:'.04em',marginBottom:'12px'}}>Tour type split</div>
          <div style={{display:'flex',gap:'12px',alignItems:'stretch'}}>
            {[['Competitor', stats.compCount, COMP_COL],['Board', stats.boardCount, BOARD_COL]].map(([label,n,col])=>(
              <div key={label} style={{flex:1,background:col+'18',border:`1px solid ${col}40`,borderRadius:'8px',padding:'14px',textAlign:'center'}}>
                <div style={{fontSize:'28px',fontWeight:700,color:col}}>{n}</div>
                <div style={{fontSize:'11px',color:col,fontWeight:600,marginTop:'4px'}}>{label}</div>
                <div style={{fontSize:'10px',color:'#a8a29e',marginTop:'2px'}}>{Math.round(n/(stats.compCount+stats.boardCount)*100)}%</div>
              </div>
            ))}
          </div>
        </div>
        <GroupedHBar items={stats.stateCompBoard} title="Competitor vs Board by State"
          keys={['Competitor','Board']} colors={{Competitor:COMP_COL,Board:BOARD_COL}} labelWidth={50}/>
      </div>

      {/* ── Source & Market ── */}
      {secHead('Source & Market Breakdown', 'Which operators and origin markets contribute the most tours')}
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'12px'}}>
        <HBar items={stats.bySource} title="Tours by Source"
          colorFn={x=>x.type==='Competitor'?COMP_COL:BOARD_COL} labelWidth={170}
          note="Orange = Competitor · Teal = Board"/>
        <HBar items={stats.byMarket} title="Tours by Origin Market"
          colorFn={(x,i)=>MKT_COLORS[stats.byMarket.indexOf(x)%MKT_COLORS.length]} labelWidth={120}/>
      </div>

      {/* ── Geography ── */}
      {secHead('Geography', 'State coverage and top cities by day-visit volume')}
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'12px'}}>
        <HBar items={stats.byState} title="Tours per State" labelWidth={60}
          colorFn={()=>BOARD_COL}/>
        <HBar items={stats.topCities} title="Top 20 Cities (by day-row count)" labelWidth={140}
          colorFn={()=>'#185FA5'} note="Each day spent in a city = 1 count"/>
      </div>

      {/* ── Themes & Duration ── */}
      {secHead('Themes & Duration', 'What themes dominate and how long are tours')}
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'12px'}}>
        <HBar items={stats.byTheme} title="Top 15 Themes (day-row + template frequency)"
          colorFn={()=>'#9333EA'} labelWidth={160}/>
        <GroupedHBar items={stats.buckets} title="Duration Distribution"
          keys={['Competitor','Board']} colors={{Competitor:COMP_COL,Board:BOARD_COL}} labelWidth={90}
          note="Tour length bucketed from template day count"/>
      </div>

    </div>
  );
}

// ════════════════════════════════════════════════════════════
// Market Intelligence view — cross-filterable charts + gap analysis
// ════════════════════════════════════════════════════════════

function ClickHBar({items, title, colorFn, labelWidth, note, selected, onSelect, maxHeight}){
  labelWidth = labelWidth || 160;
  const max = Math.max(...items.map(x=>x.v), 1);
  selected = selected || [];
  return (
    <div style={{background:'#fff',border:'0.5px solid #e7e5e4',borderRadius:'8px',padding:'14px 16px',minWidth:0,height:'100%'}}>
      <div style={{fontSize:'11px',fontWeight:700,color:'#57534e',textTransform:'uppercase',letterSpacing:'.04em',marginBottom:'10px'}}>{title}</div>
      {note && <div style={{fontSize:'10px',color:'#a8a29e',marginBottom:'8px'}}>{note}</div>}
      <div style={{display:'flex',flexDirection:'column',gap:'5px',maxHeight:maxHeight||'none',overflowY:maxHeight?'auto':'visible'}}>
        {items.map((x,i)=>{
          const pct = Math.round(x.v/max*100);
          const col = colorFn ? colorFn(x) : '#1D9E75';
          const isSel = selected.includes(x.label);
          return (
            <div key={i} onClick={()=>onSelect&&onSelect(x.label)}
              style={{display:'flex',alignItems:'center',gap:'8px',fontSize:'11px',cursor:onSelect?'pointer':'default',
                padding:'2px 4px',borderRadius:'4px',background:isSel?'#EAF3DE':'transparent',border:isSel?'1px solid #97C459':'1px solid transparent'}}>
              <div style={{width:labelWidth,minWidth:labelWidth,textAlign:'right',color:isSel?'#27500A':'#57534e',fontWeight:isSel?700:400,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',flexShrink:0}} title={x.displayLabel||x.label}>{isSel?'✓ ':''}{x.displayLabel||x.label}</div>
              <div style={{flex:1,height:'16px',background:'#f0efed',borderRadius:'3px',overflow:'hidden'}}>
                <div style={{height:'100%',width:pct+'%',background:isSel?'#27500A':col,borderRadius:'3px',transition:'width .3s'}}/>
              </div>
              <div style={{width:'32px',textAlign:'right',fontWeight:600,color:'#1c1917',flexShrink:0}}>{x.v}</div>
            </div>
          );
        })}
        {items.length===0? <div style={{fontSize:'11px',color:'#a8a29e',padding:'4px 0'}}>No matches</div>:null}
      </div>
    </div>
  );
}

function SortArrow({dir}){
  return <span style={{fontSize:'9px',marginLeft:'3px'}}>{dir==='asc'?'▲':'▼'}</span>;
}

function DonutChart({competitor, board, compColor, boardColor, selected, onSelect}){
  const total = (competitor||0) + (board||0);
  const compPct = total? Math.round(competitor/total*100) : 0;
  const boardPct = total? 100-compPct : 0;
  const R = 40, C = 2*Math.PI*R;
  const compLen = total? (competitor/total)*C : 0;
  const isCompSel = selected==='Competitor', isBoardSel = selected==='Board';
  return (
    <div style={{background:'#fff',border:'0.5px solid #e7e5e4',borderRadius:'8px',padding:'14px 16px',minWidth:0,height:'100%'}}>
      <div style={{fontSize:'11px',fontWeight:700,color:'#57534e',textTransform:'uppercase',letterSpacing:'.04em',marginBottom:'10px'}}>Competitor vs Board</div>
      <div style={{display:'flex',alignItems:'center',gap:'18px'}}>
        <svg width="100" height="100" viewBox="0 0 100 100" style={{flexShrink:0}}>
          <circle cx="50" cy="50" r={R} fill="none" stroke="#f0efed" strokeWidth="14"/>
          <circle cx="50" cy="50" r={R} fill="none" stroke={boardColor} strokeWidth="14"
            strokeDasharray={C} strokeDashoffset={-compLen} transform="rotate(-90 50 50)"
            onClick={()=>onSelect&&onSelect('Board')} style={{cursor:onSelect?'pointer':'default',opacity:isCompSel?0.35:1}}/>
          <circle cx="50" cy="50" r={R} fill="none" stroke={compColor} strokeWidth="14"
            strokeDasharray={`${compLen} ${C-compLen}`} transform="rotate(-90 50 50)"
            onClick={()=>onSelect&&onSelect('Competitor')} style={{cursor:onSelect?'pointer':'default',opacity:isBoardSel?0.35:1}}/>
          <text x="50" y="54" textAnchor="middle" fontSize="16" fontWeight="700" fill="#1c1917">{total}</text>
        </svg>
        <div style={{display:'flex',flexDirection:'column',gap:'6px'}}>
          <div onClick={()=>onSelect&&onSelect('Competitor')} style={{cursor:onSelect?'pointer':'default',display:'flex',alignItems:'center',gap:'6px',padding:'2px 4px',borderRadius:'4px',background:isCompSel?'#FBE4D1':'transparent'}}>
            <div style={{width:'9px',height:'9px',borderRadius:'2px',background:compColor}}/>
            <span style={{fontSize:'11px',color:'#57534e'}}>{isCompSel?'✓ ':''}Competitor</span>
            <span style={{fontSize:'11px',fontWeight:700,color:'#1c1917'}}>{compPct}% ({competitor})</span>
          </div>
          <div onClick={()=>onSelect&&onSelect('Board')} style={{cursor:onSelect?'pointer':'default',display:'flex',alignItems:'center',gap:'6px',padding:'2px 4px',borderRadius:'4px',background:isBoardSel?'#D9EFE6':'transparent'}}>
            <div style={{width:'9px',height:'9px',borderRadius:'2px',background:boardColor}}/>
            <span style={{fontSize:'11px',color:'#57534e'}}>{isBoardSel?'✓ ':''}Board</span>
            <span style={{fontSize:'11px',fontWeight:700,color:'#1c1917'}}>{boardPct}% ({board})</span>
          </div>
        </div>
      </div>
    </div>
  );
}

function GroupedClickHBar({items, title, keyA, keyB, colorA, colorB, labelWidth, selectedA, selectedB, onSelectA, onSelectB}){
  // items: [{label, [keyA]: n, [keyB]: n}] — grouped bar per label, click either segment independently
  labelWidth = labelWidth || 110;
  selectedA = selectedA || []; selectedB = selectedB || [];
  const max = Math.max(...items.flatMap(x=>[x[keyA]||0, x[keyB]||0]), 1);
  return (
    <div style={{background:'#fff',border:'0.5px solid #e7e5e4',borderRadius:'8px',padding:'14px 16px',minWidth:0,height:'100%'}}>
      <div style={{fontSize:'11px',fontWeight:700,color:'#57534e',textTransform:'uppercase',letterSpacing:'.04em',marginBottom:'4px'}}>{title}</div>
      <div style={{display:'flex',gap:'12px',marginBottom:'10px'}}>
        <div style={{display:'flex',alignItems:'center',gap:'4px',fontSize:'10px',color:'#57534e'}}><div style={{width:'10px',height:'10px',borderRadius:'2px',background:colorA}}/>{keyA}</div>
        <div style={{display:'flex',alignItems:'center',gap:'4px',fontSize:'10px',color:'#57534e'}}><div style={{width:'10px',height:'10px',borderRadius:'2px',background:colorB}}/>{keyB}</div>
      </div>
      <div style={{display:'flex',flexDirection:'column',gap:'8px'}}>
        {items.map((x,i)=>{
          const isSelA = selectedA.includes(x.label);
          const isSelB = selectedB.includes(x.label);
          return (
            <div key={i} style={{display:'flex',alignItems:'center',gap:'8px',fontSize:'11px'}}>
              <div style={{width:labelWidth,minWidth:labelWidth,textAlign:'right',color:'#57534e',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',flexShrink:0}} title={x.label}>{x.label}</div>
              <div style={{flex:1,display:'flex',flexDirection:'column',gap:'3px'}}>
                <div onClick={()=>onSelectA&&onSelectA(x.label)} style={{display:'flex',alignItems:'center',gap:'4px',cursor:onSelectA?'pointer':'default',padding:'1px 3px',borderRadius:'3px',background:isSelA?'#EAF3DE':'transparent',border:isSelA?'1px solid #97C459':'1px solid transparent'}}>
                  <div style={{flex:1,height:'9px',background:'#f0efed',borderRadius:'2px',overflow:'hidden'}}>
                    <div style={{height:'100%',width:Math.round((x[keyA]||0)/max*100)+'%',background:isSelA?'#27500A':colorA,borderRadius:'2px'}}/>
                  </div>
                  <div style={{width:'26px',textAlign:'right',fontSize:'10px',color:'#57534e'}}>{x[keyA]||0}</div>
                </div>
                <div onClick={()=>onSelectB&&onSelectB(x.label)} style={{display:'flex',alignItems:'center',gap:'4px',cursor:onSelectB?'pointer':'default',padding:'1px 3px',borderRadius:'3px',background:isSelB?'#EAF3DE':'transparent',border:isSelB?'1px solid #97C459':'1px solid transparent'}}>
                  <div style={{flex:1,height:'9px',background:'#f0efed',borderRadius:'2px',overflow:'hidden'}}>
                    <div style={{height:'100%',width:Math.round((x[keyB]||0)/max*100)+'%',background:isSelB?'#27500A':colorB,borderRadius:'2px'}}/>
                  </div>
                  <div style={{width:'26px',textAlign:'right',fontSize:'10px',color:'#57534e'}}>{x[keyB]||0}</div>
                </div>
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

const HEATMAP_STATE_ORDER = ['NSW','VIC','QLD','WA','SA','TAS','NT','ACT'];

// Readable source display names — underlying data key (source_key) is unchanged,
// this is display-only. Charts show name only; the itinerary table shows name + flag.
const SOURCE_DISPLAY = {
  make_my_trip:        {name:'MakeMyTrip',          flag:'🇮🇳 India'},
  thomas_cook:         {name:'Thomas Cook',         flag:'🇮🇳 India'},
  sotc:                {name:'SOTC',                flag:'🇮🇳 India'},
  kesari:              {name:'Kesari Tours',        flag:'🇮🇳 India'},
  veena_world:         {name:'Veena World',         flag:'🇮🇳 India'},
  chan_brothers:       {name:'Chan Brothers',       flag:'🇸🇬 Singapore'},
  scott_dunn:          {name:'Scott Dunn',          flag:'🇬🇧 UK'},
  jacada:              {name:'Jacada Travel',       flag:'🇬🇧 UK'},
  global_journeys:     {name:'Global Journeys',     flag:'🇦🇺 Australia'},
  inside_australia:    {name:'Inside Australia',    flag:'🇦🇺 Australia'},
  absolute_australia:  {name:'Absolute Australia',  flag:'🇦🇺 Australia'},
  australia_com:       {name:'Tourism Australia',   flag:'🇦🇺 Board'},
  westernaustralia_com:{name:'Tourism WA',          flag:'🇦🇺 Board'},

  discover_tasmania:   {name:'Discover Tasmania',   flag:'🇦🇺 Board'},

function sourceName(key){ return (SOURCE_DISPLAY[key]||{}).name || key; }
function sourceLabel(key){ const d=SOURCE_DISPLAY[key]; return d? `${d.name} · ${d.flag}` : key; }
const MI_FILTER_STORAGE_KEY = 'mi_filter_state';

function loadMIFilterState(){
  try {
    const raw = localStorage.getItem(MI_FILTER_STORAGE_KEY);
    if (!raw) return null;
    const s = JSON.parse(raw);
    return {
      marketFilter: Array.isArray(s.marketFilter)? s.marketFilter : [],
      stateFilter:  Array.isArray(s.stateFilter)?  s.stateFilter  : [],
      cityFilter:   Array.isArray(s.cityFilter)?   s.cityFilter   : [],
      productFilter: Array.isArray(s.productFilter)? s.productFilter : [],
      sourceFilter: Array.isArray(s.sourceFilter)? s.sourceFilter : [],
      typeFilter:   typeof s.typeFilter==='string'? s.typeFilter : 'all',
      sortCol:      typeof s.sortCol==='string'? s.sortCol : 'total_days',
      sortDir:      s.sortDir==='asc'? 'asc' : 'desc',
      sidebarTab:   s.sidebarTab==='products'? 'products' : 'cities',
      sidebarSearch: typeof s.sidebarSearch==='string'? s.sidebarSearch : '',
      sidebarOpen:  s.sidebarOpen!==false,
    };
  } catch(e) { return null; }
}

function MarketIntelligenceView({onGoToTemplate, onGoToTemplateFiltered, onGenerateDraft, catalog, allTemplatesGlobal}){
  const allTours = window.MARKET_DATA || [];
  const restored = useMemo(()=>loadMIFilterState(), []);

  // multi-select drill-down filters — all additive (AND across dimensions, OR within)
  // Change 2: initial state is restored from localStorage (key: mi_filter_state)
  // so filters survive navigating away to another tab and back.
  const [marketFilter, setMarketFilter] = useState(()=>restored? restored.marketFilter : []);
  const [stateFilter, setStateFilter]   = useState(()=>restored? restored.stateFilter : []);
  const [cityFilter, setCityFilter]     = useState(()=>restored? restored.cityFilter : []);
  const [productFilter, setProductFilter] = useState(()=>restored? restored.productFilter : []);
  const [sourceFilter, setSourceFilter] = useState(()=>restored? restored.sourceFilter : []);
  const [typeFilter, setTypeFilter]     = useState(()=>restored? restored.typeFilter : 'all');

  const [sortCol, setSortCol] = useState(()=>restored? restored.sortCol : 'total_days');
  const [sortDir, setSortDir] = useState(()=>restored? restored.sortDir : 'desc');   // 'asc' | 'desc'

  const [sidebarTab, setSidebarTab] = useState(()=>restored? restored.sidebarTab : 'cities');   // 'cities' | 'products'
  const [sidebarSearch, setSidebarSearch] = useState(()=>restored? restored.sidebarSearch : '');
  const [sidebarOpen, setSidebarOpen] = useState(()=>restored? restored.sidebarOpen : true);

  // persist on every change so returning to this tab restores exactly where the user left off
  useEffect(()=>{
    const state = {
      marketFilter, stateFilter, cityFilter, productFilter, sourceFilter, typeFilter,
      sortCol, sortDir, sidebarTab, sidebarSearch, sidebarOpen,
    };
    try { localStorage.setItem(MI_FILTER_STORAGE_KEY, JSON.stringify(state)); } catch(e) {}
  }, [marketFilter, stateFilter, cityFilter, productFilter, sourceFilter, typeFilter, sortCol, sortDir, sidebarTab, sidebarSearch, sidebarOpen]);

  function toggle(setter){ return (label)=> setter(prev => prev.includes(label) ? prev.filter(x=>x!==label) : [...prev, label]); }
  const toggleMarket  = toggle(setMarketFilter);
  const toggleState   = toggle(setStateFilter);
  const toggleCity    = toggle(setCityFilter);
  const toggleProduct = toggle(setProductFilter);
  const toggleSource  = toggle(setSourceFilter);

  function cycleSort(col){
    if (sortCol!==col) { setSortCol(col); setSortDir('asc'); return; }
    if (sortDir==='asc') { setSortDir('desc'); return; }
    // third click: back to default
    setSortCol('total_days'); setSortDir('desc');
  }

  const markets = useMemo(()=>[...new Set(allTours.map(t=>t.market).filter(Boolean))].sort(), [allTours]);
  const states  = useMemo(()=>[...new Set(allTours.flatMap(t=>t.states||[t.state]).filter(Boolean))].sort(), [allTours]);

  // Cross-filter predicate, parameterized so a chart can compute its own bar
  // list against "every filter except my own dimension" — otherwise selecting
  // the first option in a dimension collapses that same chart down to just
  // the selected bar, making a second selection in the same chart impossible.
  // Fix 1: every dimension is OR-within / AND-across. Market/state/source were
  // already OR (some()/includes()) — productFilter used .every(), requiring a
  // tour to contain ALL selected products (AND) instead of ANY (OR). Switched
  // to .some() so "(product A OR product B) AND (market A OR market B) AND ..."
  // holds across the whole filter set, matching every other dimension.
  function passesFilters(t, opts){
    opts = opts || {};
    if (!opts.skipMarket  && marketFilter.length && !marketFilter.includes(t.market)) return false;
    if (!opts.skipState   && stateFilter.length && !stateFilter.some(s=>(t.states||[t.state]).includes(s))) return false;
    if (!opts.skipCity    && cityFilter.length && !cityFilter.some(c=>(t.city||[]).includes(c))) return false;
    if (!opts.skipProduct && productFilter.length && !productFilter.some(p=>(t.products||[]).includes(p))) return false;
    if (!opts.skipSource  && sourceFilter.length && !sourceFilter.includes(t.source)) return false;
    if (typeFilter!=='all' && t.source_type!==typeFilter) return false;
    return true;
  }

  const filtered = useMemo(()=>allTours.filter(t=>passesFilters(t)),
    [allTours, marketFilter, stateFilter, cityFilter, productFilter, sourceFilter, typeFilter]);

  // per-dimension scopes for chart bar lists — each excludes its own filter
  // so every not-yet-selected option in that same chart stays clickable
  const scopeForMarket  = useMemo(()=>allTours.filter(t=>passesFilters(t,{skipMarket:true})),
    [allTours, stateFilter, cityFilter, productFilter, sourceFilter, typeFilter]);
  const scopeForState   = useMemo(()=>allTours.filter(t=>passesFilters(t,{skipState:true})),
    [allTours, marketFilter, cityFilter, productFilter, sourceFilter, typeFilter]);
  const scopeForCity    = useMemo(()=>allTours.filter(t=>passesFilters(t,{skipCity:true})),
    [allTours, marketFilter, stateFilter, productFilter, sourceFilter, typeFilter]);
  const scopeForSource  = useMemo(()=>allTours.filter(t=>passesFilters(t,{skipSource:true})),
    [allTours, marketFilter, stateFilter, cityFilter, productFilter, typeFilter]);
  const scopeForProduct = useMemo(()=>allTours.filter(t=>passesFilters(t,{skipProduct:true})),
    [allTours, marketFilter, stateFilter, cityFilter, sourceFilter, typeFilter]);

  // Fix 1: gap analysis's "boards promote" side ignores the market filter entirely
  // (board/Reference tours carry no real market of origin — they all show
  // market="Australia" because that's the tourism board's home country, not a
  // sales market — so market-filtering them made the left panel go empty for
  // any non-Australia market). State/city/type filters still apply normally.
  const boardScope = useMemo(()=>allTours.filter(t=>{
    if (t.source_type!=='Board') return false;
    if (stateFilter.length && !stateFilter.some(s=>(t.states||[t.state]).includes(s))) return false;
    if (cityFilter.length && !cityFilter.some(c=>(t.city||[]).includes(c))) return false;
    if (productFilter.length && !productFilter.every(p=>(t.products||[]).includes(p))) return false;
    if (sourceFilter.length && !sourceFilter.includes(t.source)) return false;
    return true;
  }), [allTours, stateFilter, cityFilter, productFilter, sourceFilter]);

  const sorted = useMemo(()=>{
    const arr = filtered.slice();
    const dir = sortDir==='asc'? 1 : -1;
    arr.sort((a,b)=>{
      let av = a[sortCol], bv = b[sortCol];
      if (sortCol==='total_days') { av = av||0; bv = bv||0; return (av-bv)*dir; }
      av = (av||'').toString().toLowerCase(); bv = (bv||'').toString().toLowerCase();
      return av<bv? -1*dir : av>bv? 1*dir : 0;
    });
    return arr;
  }, [filtered, sortCol, sortDir]);

  const stats = useMemo(()=>{
    // each bar-list is built from its own "all filters except this dimension"
    // scope, so every not-yet-selected bar in a chart stays visible/clickable
    // after another bar in that same chart has already been selected.
    const mktMap = new Map();
    scopeForMarket.forEach(t=>mktMap.set(t.market, (mktMap.get(t.market)||0)+1));
    const byMarket = [...mktMap.entries()].map(([label,v])=>({label,v})).sort((a,b)=>b.v-a.v);

    const stMap = new Map();
    scopeForState.forEach(t=>(t.states||[t.state]).forEach(s=>{ if(s) stMap.set(s,(stMap.get(s)||0)+1); }));
    const byState = [...stMap.entries()].map(([label,v])=>({label,v})).sort((a,b)=>b.v-a.v);

    const cityMap = new Map();
    scopeForCity.forEach(t=>(t.city||[]).forEach(c=>cityMap.set(c,(cityMap.get(c)||0)+1)));
    const byCity = [...cityMap.entries()].map(([label,v])=>({label,v})).sort((a,b)=>b.v-a.v);

    const prodMap = new Map();
    scopeForProduct.forEach(t=>(t.products||[]).forEach(p=>prodMap.set(p,(prodMap.get(p)||0)+1)));
    const byProduct = [...prodMap.entries()].map(([label,v])=>({label,v})).sort((a,b)=>b.v-a.v);

    const durSum = new Map(), durCount = new Map();
    scopeForMarket.forEach(t=>{
      durSum.set(t.market, (durSum.get(t.market)||0)+(t.total_days||0));
      durCount.set(t.market, (durCount.get(t.market)||0)+1);
    });
    const avgDuration = [...durSum.entries()]
      .map(([label,sum])=>({label, v: Math.round((sum/durCount.get(label))*10)/10}))
      .sort((a,b)=>b.v-a.v);

    const srcDurSum = new Map(), srcDurCount = new Map();
    scopeForSource.forEach(t=>{
      srcDurSum.set(t.source, (srcDurSum.get(t.source)||0)+(t.total_days||0));
      srcDurCount.set(t.source, (srcDurCount.get(t.source)||0)+1);
    });
    const avgDurationBySource = [...srcDurSum.entries()]
      .map(([label,sum])=>({label, displayLabel: sourceName(label), v: Math.round((sum/srcDurCount.get(label))*10)/10}))
      .sort((a,b)=>b.v-a.v);

    // "Tours per source" count chart — same scopeForSource as avg-duration-by-source
    // so both charts show/hide the same not-yet-selected sources and stay in sync
    // (they share the same sourceFilter/toggleSource, so selecting in either updates both).
    const srcCountMap = new Map();
    scopeForSource.forEach(t=>srcCountMap.set(t.source, (srcCountMap.get(t.source)||0)+1));
    const toursPerSource = [...srcCountMap.entries()].map(([label,v])=>({label, displayLabel: sourceName(label), v})).sort((a,b)=>b.v-a.v);

    // market x source_type grouped counts, for the "Tours by source location" chart
    const mktTypeMap = new Map();
    scopeForMarket.forEach(t=>{
      if (!mktTypeMap.has(t.market)) mktTypeMap.set(t.market, {label:t.market, Competitor:0, Board:0});
      mktTypeMap.get(t.market)[t.source_type==='Board'?'Board':'Competitor']++;
    });
    const byMarketType = [...mktTypeMap.values()].sort((a,b)=>(b.Competitor+b.Board)-(a.Competitor+a.Board));

    // gap analysis: left side (boards) uses boardScope (Fix 1, ignores market);
    // right side uses the product-exclusive scope so a selected gap item stays
    // visible/clickable in its own list, same reasoning as the charts above.
    const boardProds = new Set(), compProds = new Set();
    boardScope.forEach(t=>(t.products||[]).forEach(p=>boardProds.add(p)));
    scopeForProduct.filter(t=>t.source_type!=='Board').forEach(t=>(t.products||[]).forEach(p=>compProds.add(p)));
    const boardOnly = [...boardProds].filter(p=>!compProds.has(p)).sort();
    const compOnly  = [...compProds].filter(p=>!boardProds.has(p)).sort();

    // Coverage heatmap: rows = competitor markets + a synthetic "Boards" row
    // (source_type==='Board' tours have no real sales market — same reasoning
    // as boardScope/Fix 1 — so they're bucketed by state only, not market).
    // Built from a scope that excludes BOTH market and state filters (its own
    // two dimensions) so every not-yet-selected row/column stays clickable,
    // consistent with the scopeForX pattern used by the charts above.
    const heatmapScope = allTours.filter(t=>passesFilters(t,{skipMarket:true, skipState:true}));
    const heatmapMarkets = [...new Set(heatmapScope.filter(t=>t.source_type!=='Board').map(t=>t.market).filter(Boolean))].sort();
    const heatmapRows = [...heatmapMarkets, 'Boards'];
    const heatmapCells = {};   // 'Market|State' -> count
    heatmapScope.forEach(t=>{
      const rowKey = t.source_type==='Board' ? 'Boards' : t.market;
      if (!rowKey) return;
      (t.states||[t.state]).forEach(s=>{
        if (!s) return;
        const key = rowKey+'|'+s;
        heatmapCells[key] = (heatmapCells[key]||0)+1;
      });
    });
    // Fix 3: normalize the colour ramp separately for the Boards row vs the
    // competitor-market rows. A single shared max (dominated by the much
    // larger Board counts) washed out all the small competitor-market cells
    // to the same faint shade regardless of their own relative differences.
    const boardCellVals = HEATMAP_STATE_ORDER.map(s=>heatmapCells['Boards|'+s]||0);
    const compCellVals  = heatmapMarkets.flatMap(m=>HEATMAP_STATE_ORDER.map(s=>heatmapCells[m+'|'+s]||0));
    const heatmapMaxBoard = Math.max(1, ...boardCellVals);
    const heatmapMaxComp  = Math.max(1, ...compCellVals);

    // live summary line above the itinerary table — always reflects the FULL
    // active filter set (every dimension), unlike the per-chart scopes above.
    const summaryUniqueSources = new Set(filtered.map(t=>t.source)).size;
    const summaryUniqueMarkets = new Set(filtered.map(t=>t.market)).size;
    const summaryUniqueStates  = new Set(filtered.flatMap(t=>t.states||[t.state]).filter(Boolean)).size;
    const summaryUniqueProducts = new Set(filtered.flatMap(t=>t.products||[])).size;
    const summaryAvgDays = filtered.length
      ? Math.round((filtered.reduce((s,t)=>s+(t.total_days||0),0)/filtered.length)*10)/10
      : 0;
    const summary = {
      tours: filtered.length, sources: summaryUniqueSources, markets: summaryUniqueMarkets,
      states: summaryUniqueStates, avgDays: summaryAvgDays, products: summaryUniqueProducts,
    };

    // KPI cards row — always the full active filter set (every dimension),
    // same basis as the summary line above the table.
    const compCount = filtered.filter(t=>t.source_type!=='Board').length;
    const boardCount = filtered.length - compCount;
    const kpiTotal = compCount + boardCount;
    const kpi = {
      tours: filtered.length, sources: summaryUniqueSources, markets: summaryUniqueMarkets,
      avgDays: summaryAvgDays, products: summaryUniqueProducts,
      compCount, boardCount,
      compPct: kpiTotal? Math.round(compCount/kpiTotal*100) : 0,
      boardPct: kpiTotal? 100-Math.round(compCount/kpiTotal*100) : 0,
    };

    return {byMarket, byState, byCity, byProduct, avgDuration, avgDurationBySource, toursPerSource, byMarketType, boardOnly, compOnly, summary, kpi,
      heatmapRows, heatmapCells, heatmapMaxBoard, heatmapMaxComp};
  }, [filtered, boardScope, scopeForMarket, scopeForState, scopeForCity, scopeForSource, scopeForProduct,
      allTours, marketFilter, stateFilter, cityFilter, productFilter, sourceFilter, typeFilter]);

  // ---- Insight cards: auto-generated from the currently filtered dataset ----
  // All 5 rules read only from `filtered` (respects every active filter, including
  // typeFilter/sourceFilter/cityFilter/productFilter) plus per-market/per-state/per-source
  // tallies each rule needs. No AI/API — pure client-side aggregation, recomputed
  // whenever the filtered set changes.
  const insightCards = useMemo(()=>{
    const ALL_MARKETS = ['India','Singapore','UK','Australia'];
    const activeMarkets = marketFilter.length ? marketFilter : ALL_MARKETS;

    // tours-by-market-by-state count, competitor only (boards have no sales market)
    const compByMarketState = new Map(); // 'Market|State' -> count
    const compByMarket = new Map();      // Market -> count (for dominance rule denominator)
    const boardByState = new Map();      // State -> count
    const durByMarketState = new Map();  // 'Market|State' -> {sum,count}
    const boardDurByState = new Map();   // State -> {sum,count}
    const marketsPerState = new Map();   // State -> Set(markets present, competitor only)
    const sourceByMarket = new Map();    // Market -> Map(source -> count)

    filtered.forEach(t=>{
      const isBoard = t.source_type==='Board';
      const states = t.states && t.states.length ? t.states : (t.state? [t.state] : []);
      if (isBoard){
        states.forEach(s=>{
          boardByState.set(s, (boardByState.get(s)||0)+1);
          const bd = boardDurByState.get(s) || {sum:0,count:0};
          bd.sum += (t.total_days||0); bd.count += 1;
          boardDurByState.set(s, bd);
        });
      } else {
        const m = t.market;
        compByMarket.set(m, (compByMarket.get(m)||0)+1);
        if (!sourceByMarket.has(m)) sourceByMarket.set(m, new Map());
        sourceByMarket.get(m).set(t.source, (sourceByMarket.get(m).get(t.source)||0)+1);
        states.forEach(s=>{
          const key = m+'|'+s;
          compByMarketState.set(key, (compByMarketState.get(key)||0)+1);
          const dd = durByMarketState.get(key) || {sum:0,count:0};
          dd.sum += (t.total_days||0); dd.count += 1;
          durByMarketState.set(key, dd);
          if (!marketsPerState.has(s)) marketsPerState.set(s, new Set());
          marketsPerState.get(s).add(m);
        });
      }
    });

    const allStates = HEATMAP_STATE_ORDER;
    const cards = { gap:[], untapped:[], duration:[], dominance:[], saturated:[] };

    // Rule 1 — Coverage gap: market has <3 tours in a state, boards have >20 in that state
    activeMarkets.forEach(m=>{
      allStates.forEach(s=>{
        const compN = compByMarketState.get(m+'|'+s) || 0;
        const boardN = boardByState.get(s) || 0;
        if (compN < 3 && boardN > 20){
          cards.gap.push({
            market:m, state:s, compN, boardN,
            ratio: boardN / Math.max(1,compN),
          });
        }
      });
    });
    cards.gap.sort((a,b)=>b.ratio-a.ratio);

    // Rule 2 — Untapped combination: market has 0 tours in a state boards cover >15
    activeMarkets.forEach(m=>{
      allStates.forEach(s=>{
        const compN = compByMarketState.get(m+'|'+s) || 0;
        const boardN = boardByState.get(s) || 0;
        if (compN === 0 && boardN > 15){
          cards.untapped.push({market:m, state:s, boardN});
        }
      });
    });
    cards.untapped.sort((a,b)=>b.boardN-a.boardN);

    // Rule 3 — Duration gap: market avg duration >2 days below board avg, same states
    activeMarkets.forEach(m=>{
      let mSum=0, mCount=0, bSum=0, bCount=0;
      allStates.forEach(s=>{
        const dd = durByMarketState.get(m+'|'+s);
        const bd = boardDurByState.get(s);
        if (dd && dd.count && bd && bd.count){
          mSum += dd.sum; mCount += dd.count;
          bSum += bd.sum; bCount += bd.count;
        }
      });
      if (mCount && bCount){
        const mAvg = mSum/mCount, bAvg = bSum/bCount;
        const gapDays = bAvg - mAvg;
        if (gapDays > 2){
          cards.duration.push({market:m, mAvg: Math.round(mAvg*10)/10, bAvg: Math.round(bAvg*10)/10, gapDays: Math.round(gapDays*10)/10});
        }
      }
    });
    cards.duration.sort((a,b)=>b.gapDays-a.gapDays);

    // Rule 4 — Saturated market: state has tours from all 4 markets AND total competitor tours >40
    allStates.forEach(s=>{
      const mktsHere = marketsPerState.get(s) || new Set();
      if (ALL_MARKETS.every(m=>mktsHere.has(m))){
        const total = ALL_MARKETS.reduce((sum,m)=>sum+(compByMarketState.get(m+'|'+s)||0), 0);
        if (total > 40) cards.saturated.push({state:s, total});
      }
    });
    cards.saturated.sort((a,b)=>b.total-a.total);

    // Rule 5 — Single source dominance: one source >50% of a market's tours
    sourceByMarket.forEach((srcMap, m)=>{
      const marketTotal = compByMarket.get(m) || 0;
      if (!marketTotal) return;
      srcMap.forEach((count, src)=>{
        const pct = count/marketTotal*100;
        if (pct > 50){
          cards.dominance.push({market:m, source:src, count, pct: Math.round(pct)});
        }
      });
    });
    cards.dominance.sort((a,b)=>b.pct-a.pct);

    // Priority order: untapped -> gap -> duration -> dominance -> saturated, cap at 5 total
    const out = [];
    const RED='#DC2626', BLUE='#185FA5', AMBER='#D97706', GREY='#78716C', ORANGE='#E8732A';

    cards.untapped.forEach(c=>out.push({
      id:'untapped|'+c.market+'|'+c.state, color:BLUE, icon:'○',
      headline:`No ${c.market} tours in ${c.state}`,
      line1:`${c.market} operators: 0 tours`,
      line2:`Boards promote ${c.state} in ${c.boardN} tours — zero competition`,
      action:{label:`Start a ${c.state} tour`, state:c.state, sourceType:'Board'},
      market:c.market, state:c.state,
    }));
    cards.gap.forEach(c=>out.push({
      id:'gap|'+c.market+'|'+c.state, color:RED, icon:'▲',
      headline:`${c.market} barely covers ${c.state}`,
      line1:`${c.market} operators: ${c.compN} tour${c.compN===1?'':'s'} in ${c.state}`,
      line2:`Tourism boards: ${c.boardN} tours in ${c.state} — high board backing`,
      action:{label:`Explore ${c.state} templates`, state:c.state, sourceType:'Board'},
      market:c.market, state:c.state,
    }));
    cards.duration.forEach(c=>out.push({
      id:'duration|'+c.market, color:AMBER, icon:'◐',
      headline:`${c.market} tours are shorter than board recommendations`,
      line1:`${c.market} average: ${c.mAvg} days · Board average: ${c.bAvg} days`,
      line2:`Gap of ${c.gapDays} days — room for longer itineraries in this market`,
      action:null,
    }));
    cards.dominance.forEach(c=>out.push({
      id:'dominance|'+c.market+'|'+c.source, color:ORANGE, icon:'●',
      headline:`${sourceName(c.source)} dominates ${c.market} coverage`,
      line1:`${sourceName(c.source)}: ${c.count} tours — ${c.pct}% of all ${c.market} tours`,
      line2:`Other operators have limited presence — potential white space`,
      action:null,
    }));
    cards.saturated.forEach(c=>out.push({
      id:'saturated|'+c.state, color:GREY, icon:'■',
      headline:`${c.state} is highly competitive`,
      line1:`All markets operate here — ${c.total} total competitor tours`,
      line2:`Differentiate on product or experience, not destination`,
      action:null,
    }));

    return out.slice(0,5);
  }, [filtered, marketFilter]);

  // 3a — per-card enrichment: missing products, recommended duration, best template match.
  // Computed from window.MARKET_DATA (board vs competitor tours for the card's market+state)
  // and allTemplatesGlobal (for the highest board-alignment template touching that state).
  function cardEnrichment(market, state){
    if (!market || !state) return null;
    const boardTours = allTours.filter(t=>t.source_type==='Board' && (t.states||[t.state]).includes(state));
    const compTours   = allTours.filter(t=>t.source_type==='Competitor' && t.market===market && (t.states||[t.state]).includes(state));

    // top products boards push in this state, that this market's operators don't sell here
    const boardProductCount = new Map();
    boardTours.forEach(t=>(t.products||[]).forEach(p=>boardProductCount.set(p, (boardProductCount.get(p)||0)+1)));
    const compProductSet = new Set(compTours.flatMap(t=>t.products||[]));
    const missingProductsAll = [...boardProductCount.entries()]
      .filter(([p])=>!compProductSet.has(p))
      .sort((a,b)=>b[1]-a[1])
      .map(([p])=>p);
    const missingProducts = missingProductsAll.slice(0,3);

    // recommended duration = max(this market's overall avg duration, board median duration for this state).
    // Median (not mean) of board tours avoids short outlier board itineraries pulling the number down;
    // the market-avg floor keeps the recommendation from undershooting what the market actually sells.
    const durs = boardTours.map(t=>t.total_days||0).filter(Boolean).sort((a,b)=>a-b);
    const boardMedian = durs.length
      ? (durs.length%2 ? durs[(durs.length-1)/2] : (durs[durs.length/2-1]+durs[durs.length/2])/2)
      : 0;
    const marketDurs = allTours.filter(t=>t.source_type==='Competitor' && t.market===market).map(t=>t.total_days||0).filter(Boolean);
    const marketAvg = marketDurs.length? marketDurs.reduce((a,b)=>a+b,0)/marketDurs.length : 0;
    const avgDur = Math.max(marketAvg, boardMedian);
    const durLow = Math.round(avgDur)-1, durHigh = Math.round(avgDur)+1;

    // best template touching this state, by board alignment %
    const prodInfoFor = (s,name)=>{ const c=catalog && catalog[s]; return (c&&c.products) ? c.products[name] : null; };
    let bestTemplate = null, bestPct = -1;
    (allTemplatesGlobal||[]).forEach(t=>{
      if (!(t.states||[]).includes(state)) return;
      let board=0, resolved=0;
      (t.days||[]).forEach(d=>(d.places||[]).forEach(p=>{ const info=prodInfoFor(d.state,p); if(info){ resolved++; if(info.board) board++; } }));
      if (!resolved) return;
      const pct = Math.round(board/resolved*100);
      if (pct > bestPct){ bestPct = pct; bestTemplate = t; }
    });

    // most common Day-1 (arrival) city among board templates touching this state
    const arrivalCityCount = new Map();
    (allTemplatesGlobal||[]).forEach(t=>{
      if (t.type!=='Board' || !(t.states||[]).includes(state)) return;
      const c = t.days && t.days[0] && t.days[0].city;
      if (c) arrivalCityCount.set(c, (arrivalCityCount.get(c)||0)+1);
    });
    const arrivalCity = [...arrivalCityCount.entries()].sort((a,b)=>b[1]-a[1])[0];

    return {
      missingProducts, missingProductsAll, avgDur: Math.round(avgDur), durLow, durHigh,
      bestTemplate, bestPct: bestTemplate? bestPct : null,
      arrivalCity: arrivalCity? arrivalCity[0] : (state||''),
    };
  }

  const MKT_COLORS = ['#185FA5','#1D9E75','#E8732A','#9333EA','#0D9488','#DC2626','#F59E0B'];
  const COMP_COL  = '#E8732A';
  const BOARD_COL = '#1D9E75';

  const selectClass = {border:'0.5px solid #d6d3d1',borderRadius:'6px',padding:'6px 10px',fontSize:'12px',background:'#fff',cursor:'pointer'};

  const hasActiveFilters = marketFilter.length>0 || stateFilter.length>0 || cityFilter.length>0 || productFilter.length>0 || sourceFilter.length>0 || typeFilter!=='all';
  function clearAll(){
    setMarketFilter([]); setStateFilter([]); setCityFilter([]); setProductFilter([]); setSourceFilter([]); setTypeFilter('all');
    try { localStorage.removeItem(MI_FILTER_STORAGE_KEY); } catch(e) {}
  }

  const thStyle = (col) => ({cursor:'pointer',userSelect:'none',color:sortCol===col?'#27500A':'#57534e',display:'flex',alignItems:'center'});

  const columns = [
    ['tour_name','Tour name','2.2fr'],['source','Source','1fr'],['market','Market','0.8fr'],
    ['state','State','0.6fr'],['total_days','Days','0.5fr'],['source_type','Type','0.8fr'],
  ];
  const gridCols = columns.map(c=>c[2]).join(' ');

  // Fix 3: sidebar list of cities or products, searchable, checkbox multi-select
  const sidebarSelected = sidebarTab==='cities'? cityFilter : productFilter;
  const sidebarToggle   = sidebarTab==='cities'? toggleCity : toggleProduct;
  // Fix 1: selected items float to their own group at the top, live-updating as checkboxes toggle
  const {sidebarSelectedItems, sidebarRestItems} = useMemo(()=>{
    const src = sidebarTab==='cities'? stats.byCity : stats.byProduct;
    const q = sidebarSearch.trim().toLowerCase();
    const list = q? src.filter(x=>x.label.toLowerCase().includes(q)) : src;
    const selected = [], rest = [];
    list.forEach(x=>{ (sidebarSelected.includes(x.label)? selected : rest).push(x); });
    return {sidebarSelectedItems: selected.slice(0,200), sidebarRestItems: rest.slice(0,200)};
  }, [sidebarTab, sidebarSearch, stats.byCity, stats.byProduct, sidebarSelected]);

  return (
    <div style={{padding:'18px 20px',display:'flex',gap:'16px',alignItems:'flex-start'}}>
    <div style={{flex:1,minWidth:0,display:'flex',flexDirection:'column',gap:'16px'}}>

      {/* ── filters bar ── */}
      <div style={{display:'flex',alignItems:'center',gap:'10px',flexWrap:'wrap',background:'#fff',border:'0.5px solid #e7e5e4',borderRadius:'8px',padding:'12px 14px'}}>
        <div style={{fontSize:'11px',fontWeight:700,color:'#57534e',textTransform:'uppercase',letterSpacing:'.04em'}}>Filters</div>

        <select value={marketFilter.length===1?marketFilter[0]:''} onChange={e=>{ if(e.target.value) toggleMarket(e.target.value); }} style={selectClass}>
          <option value="">{marketFilter.length>1? 'Multiple' : marketFilter.length===1? marketFilter[0] : 'All markets'}</option>
          {markets.map(m=><option key={m} value={m}>{m}</option>)}
        </select>

        <select value={stateFilter.length===1?stateFilter[0]:''} onChange={e=>{ if(e.target.value) toggleState(e.target.value); }} style={selectClass}>
          <option value="">{stateFilter.length>1? 'Multiple' : stateFilter.length===1? stateFilter[0] : 'All states'}</option>
          {states.map(s=><option key={s} value={s}>{s}</option>)}
        </select>

        <select value={typeFilter} onChange={e=>setTypeFilter(e.target.value)} style={selectClass}>
          <option value="all">All source types</option>
          <option value="Competitor">Competitor</option>
          <option value="Board">Board</option>
        </select>

        {cityFilter.length? <span style={{fontSize:'11px',color:'#27500A',background:TINT,border:'0.5px solid #C0DD97',borderRadius:'99px',padding:'3px 10px'}}>{cityFilter.length} {cityFilter.length===1?'city':'cities'}</span>:null}
        {productFilter.length? <span style={{fontSize:'11px',color:'#27500A',background:TINT,border:'0.5px solid #C0DD97',borderRadius:'99px',padding:'3px 10px'}}>{productFilter.length} product(s)</span>:null}
        {sourceFilter.length? <span style={{fontSize:'11px',color:'#27500A',background:TINT,border:'0.5px solid #C0DD97',borderRadius:'99px',padding:'3px 10px'}}>{sourceFilter.length} source(s)</span>:null}

        <div style={{flex:1}}/>
        <span style={{fontSize:'12px',color:'#57534e'}}>{filtered.length} of {allTours.length} tours</span>
        {hasActiveFilters? <button onClick={clearAll} style={{...ghostBtn,padding:'4px 10px',fontSize:'11px'}}>✕ Clear all filters</button>:null}
      </div>

      {/* ── KPI cards row ── */}
      <div style={{display:'grid',gridTemplateColumns:'repeat(6,1fr)',gap:'10px'}}>
        {[
          ['Total tours', stats.kpi.tours.toLocaleString(), null],

          ['Avg tour duration', stats.kpi.avgDays+' days', null],

          ['Competitor vs Board', null, 'split'],
        ].map(([label,num,kind])=>(
          <div key={label} style={{background:'#fff',border:'0.5px solid #e7e5e4',borderRadius:'8px',padding:'14px 16px'}}>
            <div style={{fontSize:'10px',color:'#57534e',textTransform:'uppercase',letterSpacing:'.04em',marginBottom:'4px'}}>{label}</div>
            {kind==='split'? (
              <>
                <div style={{fontSize:'20px',fontWeight:700,color:'#1c1917'}}>{stats.kpi.compPct}% / {stats.kpi.boardPct}%</div>
                <div style={{display:'flex',gap:'3px',marginTop:'6px',height:'6px',borderRadius:'3px',overflow:'hidden'}}>
                  <div style={{width:stats.kpi.compPct+'%',background:COMP_COL}}/>
                  <div style={{width:stats.kpi.boardPct+'%',background:BOARD_COL}}/>
                </div>
              </>
            ):(
              <div style={{fontSize:'26px',fontWeight:700,color:'#1c1917'}}>{num}</div>
            )}
          </div>
        ))}
      </div>

      {/* ── insight cards: auto-generated from the current filtered dataset, no AI/API ── */}
      <div>
        <div style={{fontSize:'11px',fontWeight:700,color:'#57534e',textTransform:'uppercase',letterSpacing:'.04em',marginBottom:'8px'}}>Insights</div>
        <div style={{display:'flex',flexWrap:'wrap',gap:'10px'}}>
          {(insightCards.length? insightCards : [{
            id:'none', color:'#78716C', icon:'—',
            headline:'No significant gaps found for this filter combination',
            line1:'', line2:'', action:null,
          }]).map(c=>{
            const enr = c.market && c.state ? cardEnrichment(c.market, c.state) : null;
            return (
            <div key={c.id} style={{
              flex:'1 1 260px', minWidth:'240px', maxWidth:'320px',
              background:'#fff', border:'0.5px solid #e7e5e4', borderLeft:`4px solid ${c.color}`,
              borderRadius:'12px', padding:'12px 14px',
              display:'flex', flexDirection:'column', gap:'4px',
              animation:'miInsightFadeIn .25s ease',
            }}>
              <div style={{display:'flex',alignItems:'flex-start',gap:'8px'}}>
                <div style={{fontSize:'13px',color:c.color,lineHeight:1.3}}>{c.icon}</div>
                <div style={{fontSize:'13px',fontWeight:500,color:'#1c1917',lineHeight:1.35}}>{c.headline}</div>
              </div>
              {c.line1? <div style={{fontSize:'12px',color:'#78716C',marginLeft:'21px'}}>{c.line1}</div>:null}
              {c.line2? <div style={{fontSize:'12px',color:'#78716C',marginLeft:'21px'}}>{c.line2}</div>:null}

              {enr && enr.missingProducts.length? (
                <div style={{marginLeft:'21px',marginTop:'6px'}}>
                  <div style={{fontSize:'10px',color:'#78716C',marginBottom:'4px'}}>Boards promote — competitors missing:</div>
                  <div style={{display:'flex',flexWrap:'wrap',gap:'4px'}}>
                    {enr.missingProducts.map(p=><span key={p} style={chip('board',{small:true})}>{p}</span>)}
                  </div>
                </div>
              ):null}

              {enr && enr.avgDur? (
                <div style={{marginLeft:'21px',marginTop:'6px',fontSize:'11px',color:'#57534e'}}>
                  Recommended duration: <b>{enr.durLow}–{enr.durHigh} days</b>
                </div>
              ):null}

              {enr && enr.bestTemplate? (
                <div style={{marginLeft:'21px',marginTop:'2px',fontSize:'11px',color:'#57534e'}}>
                  Best starting point: <b>{enr.bestTemplate.name}</b> ({enr.bestPct}% board alignment)
                </div>
              ):null}

              {enr? (
                <div style={{marginTop:'10px'}}>
                  <button
                    onClick={()=>onGenerateDraft && onGenerateDraft(c.market, c.state, enr)}
                    style={{...primaryBtn, width:'100%', padding:'10px 14px', fontSize:'13px'}}>
                    Generate draft itinerary →
                  </button>
                </div>
              ) : c.action ? (
                <div style={{marginLeft:'21px',marginTop:'4px'}}>
                  <button
                    onClick={()=>onGoToTemplateFiltered && onGoToTemplateFiltered({state:c.action.state, sourceType:c.action.sourceType})}
                    style={{...ghostBtn, padding:'4px 10px', fontSize:'11px'}}>
                    {c.action.label}
                  </button>
                </div>
              ):null}
            </div>
            );
          })}
        </div>
      </div>

      {/* ── row: market + states + competitor/board donut ── */}
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:'12px'}}>
        <ClickHBar items={stats.byMarket} title="Tours by Market" labelWidth={90}
          colorFn={x=>MKT_COLORS[stats.byMarket.indexOf(x)%MKT_COLORS.length]}
          selected={marketFilter}
          onSelect={toggleMarket}/>
        <ClickHBar items={stats.byState} title="Top States Covered" labelWidth={50}
          colorFn={()=>BOARD_COL}
          selected={stateFilter}
          onSelect={toggleState}/>
        <DonutChart competitor={stats.kpi.compCount} board={stats.kpi.boardCount}
          compColor={COMP_COL} boardColor={BOARD_COL}
          selected={typeFilter} onSelect={t=>setTypeFilter(prev=>prev===t?'all':t)}/>
      </div>

      {/* ── row: cities (tall) + avg duration by market / tours per source stack ── */}
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'12px',alignItems:'stretch'}}>
        <ClickHBar items={stats.byCity.slice(0,20)} title="Top 20 Cities Covered" labelWidth={140} maxHeight="520px"
          colorFn={()=>'#185FA5'}
          selected={cityFilter}
          onSelect={toggleCity}/>
        <div style={{display:'flex',flexDirection:'column',gap:'12px'}}>
          <ClickHBar items={stats.avgDuration} title="Avg Tour Duration by Market (days)" labelWidth={110}
            colorFn={x=>MKT_COLORS[stats.avgDuration.indexOf(x)%MKT_COLORS.length]}
            selected={marketFilter}
            onSelect={toggleMarket}/>
          <ClickHBar items={stats.toursPerSource.filter(x=>x.v>=3)} title="Tours per source (count)" labelWidth={140}
            colorFn={()=>'#185FA5'}
            selected={sourceFilter}
            onSelect={toggleSource}
            note="Sources with fewer than 3 tours in current filter are hidden"/>
        </div>
      </div>

      {/* ── avg duration by source — full width ──
           Fix: same >=3-tour threshold as Tours per source, applied via a
           lookup into toursPerSource so both charts hide the same sources
           and stay consistent as filters change. */}
      <ClickHBar items={stats.avgDurationBySource.filter(x=>(stats.toursPerSource.find(y=>y.label===x.label)||{v:0}).v>=3)} title="Avg duration by source (days)" labelWidth={160}
        colorFn={()=>COMP_COL}
        selected={sourceFilter}
        onSelect={toggleSource}
        note="Click a source to filter — stays in sync with Tours per source above · sources with fewer than 3 tours in current filter are hidden"/>

      {/* ── coverage heatmap: market x state ──
           Fix 3: row headers, column headers, and every other selected
           element in this tab (ClickHBar bars, sidebar checkboxes) share one
           highlight style — background:#EAF3DE, border:1px solid #97C459,
           color:#27500A, fontWeight:700, '✓ ' prefix. Selected cells get no
           extra border of their own — the row/column header highlight already
           marks the selection; the cell just keeps its normal intensity fill. */}
      <div>
        <div style={{fontSize:'13px',fontWeight:700,color:'#1c1917',marginBottom:'2px'}}>Market × State coverage</div>
        <div style={{fontSize:'11px',color:'#a8a29e',marginBottom:'2px'}}>How many tours each market runs per state — darker = more coverage</div>
        <div style={{fontSize:'10px',color:'#a8a29e',marginBottom:'12px'}}>Cell counts show tours per state. A tour visiting multiple states appears in each relevant cell.</div>
        <div style={{background:'#fff',border:'0.5px solid #e7e5e4',borderRadius:'8px',padding:'14px 16px',overflowX:'auto'}}>
          <table style={{borderCollapse:'collapse',width:'100%'}}>
            <thead>
              <tr>
                <th style={{padding:'6px 10px',textAlign:'left'}}/>
                {HEATMAP_STATE_ORDER.map(s=>{
                  const isSel = stateFilter.includes(s);
                  return (
                    <th key={s} onClick={()=>toggleState(s)}
                      style={{padding:'6px 10px',textAlign:'center',cursor:'pointer',fontSize:'11px',fontWeight:isSel?700:600,borderRadius:'4px',
                        color:isSel?'#27500A':'#57534e',background:isSel?'#EAF3DE':'transparent',border:isSel?'1px solid #97C459':'1px solid transparent'}}>
                      {isSel?'✓ ':''}{s}
                    </th>
                  );
                })}
              </tr>
            </thead>
            <tbody>
              {stats.heatmapRows.map(row=>{
                const isBoardsRow = row==='Boards';
                const isRowSel = isBoardsRow ? typeFilter==='Board' : marketFilter.includes(row);
                const rowColor = isBoardsRow ? BOARD_COL : '#185FA5';
                const rowMax = isBoardsRow ? stats.heatmapMaxBoard : stats.heatmapMaxComp;
                return (
                  <tr key={row}>
                    <td onClick={()=>isBoardsRow? setTypeFilter(prev=>prev==='Board'?'all':'Board') : toggleMarket(row)}
                      style={{padding:'6px 10px',cursor:'pointer',fontSize:'11px',fontWeight:isRowSel?700:600,whiteSpace:'nowrap',borderRadius:'4px',
                        color:isRowSel?'#27500A':'#57534e',background:isRowSel?'#EAF3DE':'transparent',border:isRowSel?'1px solid #97C459':'1px solid transparent'}}>
                      {isRowSel?'✓ ':''}{row}
                    </td>
                    {HEATMAP_STATE_ORDER.map(s=>{
                      const count = stats.heatmapCells[row+'|'+s] || 0;
                      const intensity = count? 0.15 + 0.75*(count/rowMax) : 0;
                      return (
                        <td key={s} onClick={()=>{
                              // Cell click sets BOTH dimensions to exactly this row+column
                              // (replace, not toggle) so the table always matches the cell
                              // count — toggling into whatever arrays were already selected
                              // let stale market/state selections leak into the result.
                              if (isBoardsRow){
                                setTypeFilter('Board');
                                setMarketFilter([]);
                              } else {
                                setTypeFilter('all');
                                setMarketFilter([row]);
                              }
                              setStateFilter([s]);
                            }}
                          style={{padding:'6px 4px',textAlign:'center',cursor:'pointer',fontSize:'12px',fontWeight:count?700:400,
                            minWidth:'56px',borderRadius:'5px',
                            color:count? (intensity>0.55?'#fff':'#1c1917') : '#d6d3d1',
                            background:count? rowColor+Math.round(intensity*255).toString(16).padStart(2,'0') : '#fafaf9'}}>
                          {count || '—'}
                        </td>
                      );
                    })}
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
      </div>

      {/* ── itinerary table (sortable) ── */}
      <div>
        <div style={{fontSize:'11px',color:'#a8a29e',marginBottom:'4px'}}>
          {stats.summary.tours} tours · {stats.summary.sources} sources · {stats.summary.markets} markets · {stats.summary.states} states · {stats.summary.avgDays} avg days · {stats.summary.products} products
        </div>
        <div style={{fontSize:'13px',fontWeight:700,color:'#1c1917',marginBottom:'10px'}}>Itineraries ({sorted.length})</div>
        <div style={{background:'#fff',border:'0.5px solid #e7e5e4',borderRadius:'8px',overflow:'hidden'}}>
          <div style={{display:'grid',gridTemplateColumns:gridCols,gap:'8px',padding:'8px 14px',background:'#f5f5f4',fontSize:'10px',fontWeight:700,textTransform:'uppercase',letterSpacing:'.04em'}}>
            {columns.map(([col,label])=>(
              <div key={col} onClick={()=>cycleSort(col)} style={thStyle(col)}>
                {label}{sortCol===col?<SortArrow dir={sortDir}/>:null}
              </div>
            ))}
          </div>
          <div style={{maxHeight:'360px',overflowY:'auto'}}>
            {sorted.map((t,i)=>(
              <div key={i} onClick={()=>onGoToTemplate&&onGoToTemplate(t.tour_name, t.source)}
                style={{display:'grid',gridTemplateColumns:gridCols,gap:'8px',padding:'8px 14px',fontSize:'11px',
                  borderTop:'0.5px solid #f0efed',cursor:'pointer',alignItems:'center'}}
                onMouseEnter={e=>e.currentTarget.style.background='#fafaf9'} onMouseLeave={e=>e.currentTarget.style.background='transparent'}>
                <div style={{overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',color:'#1c1917'}} title={t.tour_name}>{t.tour_name}</div>
                <div style={{overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',color:'#57534e'}} title={sourceLabel(t.source)}>{sourceLabel(t.source)}</div>
                <div style={{color:'#57534e'}}>{t.market}</div>
                <div><span style={stateChipStyle(t.state, true)}>{t.state}</span></div>
                <div style={{color:'#57534e'}}>{t.total_days}</div>
                <div><span style={chip(t.source_type==='Board'?'board':'prod',{small:true})}>{t.source_type}</span></div>
              </div>
            ))}
            {sorted.length===0? <div style={{padding:'20px',textAlign:'center',fontSize:'12px',color:'#a8a29e'}}>No tours match the current filters</div>:null}
          </div>
        </div>
      </div>

    </div>

    {/* ── Fix 3: collapsible sidebar panel — city / product search + checkbox multi-select ── */}
    <div style={{width:sidebarOpen?'260px':'34px',minWidth:sidebarOpen?'260px':'34px',transition:'width .15s',flexShrink:0}}>
      <div style={{background:'#fff',border:'0.5px solid #e7e5e4',borderRadius:'8px',overflow:'hidden',position:'sticky',top:'18px'}}>
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'10px 12px',borderBottom:sidebarOpen?'0.5px solid #e7e5e4':'none'}}>
          {sidebarOpen? <div style={{fontSize:'11px',fontWeight:700,color:'#57534e',textTransform:'uppercase',letterSpacing:'.04em'}}>Search &amp; select</div>:null}
          <div onClick={()=>setSidebarOpen(o=>!o)} style={{cursor:'pointer',fontSize:'12px',color:'#57534e',padding:'2px 4px'}} title={sidebarOpen?'Collapse':'Expand'}>{sidebarOpen?'→':'←'}</div>
