// ════════════════════════════════════════════════════════════
// Consumer Analysis — state-overlap market fit, computed only from
// real scraped tours in window.MARKET_DATA (no hardcoded affinity numbers).
// ════════════════════════════════════════════════════════════

const CA_MARKETS = ['India', 'Singapore', 'UK', 'Australia', 'New Zealand'];
const CA_FLAGS = {India:'🇮🇳', Singapore:'🇸🇬', UK:'🇬🇧', Australia:'🇦🇺', 'New Zealand':'🇳🇿'};

// One market's real historical state distribution: % of that market's tours
// (deduped by name+source) that touch each state, plus the tour count (n)
// so low-confidence markets read differently from high-confidence ones.
function buildMarketStateProfiles(){
  const allTours = window.MARKET_DATA || [];
  const profiles = {};
  CA_MARKETS.forEach(market=>{
    const tours = allTours.filter(t=>t.market===market);
    const n = tours.length;
    const stateTourCounts = {};
    tours.forEach(t=>{
      const states = new Set(t.states && t.states.length ? t.states : (t.state ? [t.state] : []));
      states.forEach(s=>{ stateTourCounts[s] = (stateTourCounts[s]||0) + 1; });
    });
    const pct = {};
    Object.entries(stateTourCounts).forEach(([s,c])=>{ pct[s] = c / (n || 1); });
    profiles[market] = {n, pct};
  });
  return profiles;
}

// The Builder session is single-state (every day belongs to the currently
// selected stateKey — see App()'s `cur = catalog[stateKey]`).
function itineraryHasContent(days){
  return (days||[]).some(d => (d.location && d.location.trim()) || (d.products && d.products.length));
}

// Fit score per market = % of that market's own real tours that visit the
// currently selected state. e.g. if 8% of India tours visit WA, and WA is
// the selected state, India's fit score is 8%.
function computeMarketFitScores(days, stateKey){
  const totalDaysWithLocation = (days||[]).filter(d =>
    (d.location && d.location.trim()) || (d.products && d.products.length)
  ).length;
  const hasContent = !!stateKey && totalDaysWithLocation > 0;
  const profiles = buildMarketStateProfiles();
  const statesUsed = hasContent ? [stateKey] : [];
  const scores = CA_MARKETS.map(market=>{
    const profile = profiles[market];
    const raw = hasContent ? (profile.pct[stateKey] || 0) : 0;
    const score = Math.min(100, Math.round(raw * 100));
    const label = score >= 60 ? 'Strong fit' : score >= 35 ? 'Moderate fit' : 'Low fit';
    const color = score >= 60 ? '#1D9E75' : score >= 35 ? '#D97706' : '#78716C';
    return {market, score, label, color, n: profile.n, statePct: profile.pct};
  });
  return {scores, statesUsed, totalDaysWithLocation};
}

// Real operators per market, Competitor-only (Board/tourism-board sources
// have no sales channel to promote an itinerary through).
function buildOperatorsByMarket(){
  const allTours = window.MARKET_DATA || [];
  const byMarket = {};
  CA_MARKETS.forEach(market=>{
    const names = new Set();
    allTours.forEach(t=>{
      if (t.market===market && t.source_type==='Competitor') names.add(t.source);
    });
    byMarket[market] = [...names].sort();
  });
  return byMarket;
}

function caScoreQuartileLabel(pct){
  // pct is a 0..1 share of that market's tours touching the state.
  if (pct >= 0.5) return {label:'High', color:'#1D9E75'};
  if (pct >= 0.2) return {label:'Medium', color:'#D97706'};
  if (pct > 0) return {label:'Low', color:'#78716C'};
  return {label:'None', color:'#cbc9c6'};
}

// Coverage-table label — distinct thresholds from caScoreQuartileLabel, used only
// by the "Current market coverage" facts table (Historical fit's replacement).
function caCoverageLabel(pct){
  // pct is a 0..1 share of that market's tours touching the state.
  if (pct <= 0) return {label:'None', color:'#a8a29e'};
  if (pct <= 0.05) return {label:'Rare', color:'#a8a29e'};
  if (pct <= 0.20) return {label:'Some', color:'#D97706'};
  return {label:'Common', color:'#1D9E75'};
}

// Market summary for the AI prediction request: total tours, state visit
// counts, and avg tour duration per market — all derived from window.MARKET_DATA.
function buildAIMarketSummary(){
  const allTours = window.MARKET_DATA || [];
  const summary = {};
  CA_MARKETS.forEach(market=>{
    const tours = allTours.filter(t=>t.market===market);
    const stateVisits = {};
    let daySum = 0, dayCount = 0;
    tours.forEach(t=>{
      const states = new Set(t.states && t.states.length ? t.states : (t.state ? [t.state] : []));
      states.forEach(s=>{ stateVisits[s] = (stateVisits[s]||0) + 1; });
      if (t.total_days){ daySum += t.total_days; dayCount++; }
    });
    summary[market] = {
      totalTours: tours.length,
      stateVisits,
      avgDays: dayCount ? Math.round((daySum/dayCount)*10)/10 : 0,
    };
  });
  return summary;
}

// Board (tourism board) promotion data for the AI prediction request: per state,
// how many board tours visit it and the 5 most-promoted products in those tours —
// used to flag first-mover opportunities where boards push hard but competitors don't sell yet.
function buildBoardDataSummary(){
  const allTours = window.MARKET_DATA || [];
  const boardTours = allTours.filter(t=>t.source_type==='Board');
  const byState = {};
  boardTours.forEach(t=>{
    const states = new Set(t.states && t.states.length ? t.states : (t.state ? [t.state] : []));
    states.forEach(s=>{
      if (!byState[s]) byState[s] = {tours: 0, productCount: new Map()};
      byState[s].tours += 1;
      (t.products||[]).forEach(p=>{
        byState[s].productCount.set(p, (byState[s].productCount.get(p)||0)+1);
      });
    });
  });
  const summary = {};
  Object.entries(byState).forEach(([state, info])=>{
    const topProducts = [...info.productCount.entries()]
      .sort((a,b)=>b[1]-a[1])
      .slice(0,5)
      .map(([p])=>p);
    summary[state] = {boardTours: info.tours, topProducts};
  });
  return summary;
}

// Product name -> {state -> tour count} across all of window.MARKET_DATA, built once
// per call. Used to infer which state a product most likely belongs to, for itineraries
// that span multiple Australian states (the Builder session itself is single-state,
// but a PM can still add products the catalog associates with a different state).
function buildProductStateCounts(){
  const allTours = window.MARKET_DATA || [];
  const counts = {};
  allTours.forEach(t=>{
    const states = t.states && t.states.length ? t.states : (t.state ? [t.state] : []);
    (t.products||[]).forEach(p=>{
      if (!counts[p]) counts[p] = {};
      states.forEach(s=>{ counts[p][s] = (counts[p][s]||0) + 1; });
    });
  });
  return counts;
}

// Resolve a single product's most likely state: most common state across
// window.MARKET_DATA tours containing it; ties and unknown products fall back
// to the Builder's current stateKey.
function resolveProductState(product, productStateCounts, fallbackState){
  const counts = productStateCounts[product];
  if (!counts) return {state: fallbackState, fellBack: true};
  const entries = Object.entries(counts).sort((a,b)=>b[1]-a[1]);
  if (!entries.length) return {state: fallbackState, fellBack: true};
  const topCount = entries[0][1];
  const tied = entries.filter(([,c])=>c===topCount);
  if (tied.length > 1){
    const tieMatch = tied.find(([s])=>s===fallbackState);
    return {state: tieMatch ? tieMatch[0] : tied[0][0], fellBack: !tieMatch};
  }
  return {state: entries[0][0], fellBack: false};
}

// Groups the itinerary's days/products into per-state regions for the AI prediction
// request. Single-state itineraries still return a one-item regions array (Step 2).
// Logs the resolved payload (and which products fell back to stateKey) for QA.
function buildRegionsFromItinerary(days, stateKey){
  const productStateCounts = buildProductStateCounts();
  const fallbacks = [];

  const dayRegions = (days||[]).map(d=>{
    const products = d.products || [];
    if (!products.length && !((d.location||'').trim())) return null;
    const stateVotes = {};
    products.forEach(p=>{
      const {state, fellBack} = resolveProductState(p, productStateCounts, stateKey);
      stateVotes[state] = (stateVotes[state]||0) + 1;
      if (fellBack) fallbacks.push(p);
    });
    const dayState = Object.keys(stateVotes).length
      ? Object.entries(stateVotes).sort((a,b)=>b[1]-a[1])[0][0]
      : stateKey;
    return {state: dayState, products};
  }).filter(Boolean);

  const byState = {};
  dayRegions.forEach(({state, products})=>{
    if (!byState[state]) byState[state] = {days: 0, products: []};
    byState[state].days += 1;
    products.forEach(p=>{ if (!byState[state].products.includes(p)) byState[state].products.push(p); });
  });

  const regions = Object.entries(byState).map(([state, info])=>({
    state, days: info.days, products: info.products,
  }));
  const total_days = regions.reduce((sum,r)=>sum+r.days, 0);

  console.log('[AI prediction] regions payload:', {regions, total_days});
  if (fallbacks.length){
    console.log('[AI prediction] products with unknown state, fell back to', stateKey + ':', [...new Set(fallbacks)]);
  }

  return {regions, total_days};
}

const AI_PREDICTION_STORAGE_KEY = 'mi_ai_prediction';

// Sorted, comma-separated snapshot of every product currently in the itinerary —
// used to detect "has this itinerary changed enough to warrant re-analysis".
function productFingerprint(products){
  return [...(products||[])].sort().join(',');
}

// Count of products that differ between two fingerprints (added or removed),
// used for the "2 or more products changed" re-analysis threshold.
function fingerprintDiffCount(fpA, fpB){
  const a = new Set((fpA||'').split(',').filter(Boolean));
  const b = new Set((fpB||'').split(',').filter(Boolean));
  let diff = 0;
  a.forEach(x=>{ if(!b.has(x)) diff++; });
  b.forEach(x=>{ if(!a.has(x)) diff++; });
  return diff;
}

function ConsumerAnalysisView({days, stateKey}){
  const {scores, statesUsed, totalDaysWithLocation} = useMemo(()=>computeMarketFitScores(days, stateKey), [days, stateKey]);
  const operatorsByMarket = useMemo(()=>buildOperatorsByMarket(), []);

  const [aiLoading, setAiLoading] = useState(false);
  const [aiResult, setAiResult]   = useState(null);   // {predictions, summary}
  const [aiError, setAiError]     = useState(false);
  const [aiErrorMsg, setAiErrorMsg] = useState('');   // specific red error text (timeout/abort), separate from the generic Ollama-down message
  const [aiProgress, setAiProgress] = useState(0);    // 0-100, fills over ~45s while waiting on the proxy/Ollama
  const aiProgressTimer = useRef(null);
  // Persists across clicks (not reset on re-render) so a second click can abort
  // whatever request the first click started, and the 60s watchdog can abort itself.
  const aiController = useRef(null);

  const [savedPrediction, setSavedPrediction] = useState(null); // {fingerprint, predictions, summary, timestamp}

  // Debug panel (Consumer Analysis AI prediction troubleshooting) — status text,
  // live elapsed-time counter, raw response body, and HTTP status code.
  const [debugVisible, setDebugVisible] = useState(true);
  const [debugStatus, setDebugStatus] = useState('Idle');
  const [debugElapsed, setDebugElapsed] = useState(0);
  const [debugRaw, setDebugRaw] = useState('');
  const [debugHttpStatus, setDebugHttpStatus] = useState(null);
  const debugTimer = useRef(null);

  // Load any saved prediction from localStorage once on mount — persists across
  // page refresh and tab switching without re-calling the API.
  useEffect(()=>{
    try{
      const raw = localStorage.getItem(AI_PREDICTION_STORAGE_KEY);
      if (raw) setSavedPrediction(JSON.parse(raw));
    } catch(e){}
  }, []);

  const hasEnoughData = totalDaysWithLocation > 0;
  const sortedScores = [...scores].sort((a,b)=>b.score-a.score);
  const promoteMarkets = sortedScores.filter(s=>s.score >= 35);

  const allProducts = (days||[]).flatMap(d=>d.products||[]);
  const daysWithLocation = (days||[]).filter(d=>(d.location&&d.location.trim())||(d.products&&d.products.length)).length;
  const currentFingerprint = productFingerprint(allProducts);

  // States detected across the itinerary's products, for the subtitle/warning —
  // same resolution logic as buildRegionsFromItinerary but without the console logging.
  const detectedStates = useMemo(()=>{
    const productStateCounts = buildProductStateCounts();
    const set = new Set();
    allProducts.forEach(p=>{ set.add(resolveProductState(p, productStateCounts, stateKey).state); });
    if (!set.size && stateKey) set.add(stateKey);
    return [...set];
  }, [currentFingerprint, stateKey]);
  const isMultiState = detectedStates.length > 1;

  const meetsMinimums = allProducts.length >= 3 && daysWithLocation >= 2;
  const changedSinceSaved = savedPrediction
    ? fingerprintDiffCount(currentFingerprint, savedPrediction.fingerprint) >= 2
    : true; // no saved prediction yet — nothing to compare against, so allow analysis
  const canAnalyse = meetsMinimums && changedSinceSaved;

  let analyseTooltip;
  if (!meetsMinimums) analyseTooltip = 'Add at least 3 products and 2 days to analyse';
  else if (!changedSinceSaved) analyseTooltip = savedPrediction ? 'No significant changes since last analysis' : undefined;
  if (meetsMinimums && !changedSinceSaved && savedPrediction){
    const diff = fingerprintDiffCount(currentFingerprint, savedPrediction.fingerprint);
    analyseTooltip = diff > 0 ? `Add ${2-diff} more product${2-diff===1?'':'s'} since last analysis to re-analyse` : 'No significant changes since last analysis';
  }

  const showChangedBanner = !!savedPrediction && fingerprintDiffCount(currentFingerprint, savedPrediction.fingerprint) >= 2;

  async function runAiPrediction(){
    // A previous request is still in flight — abort it before starting a fresh one,
    // so a second click can never pile up on top of a hung first click.
    if (aiController.current) aiController.current.abort();
    const controller = new AbortController();
    aiController.current = controller;

    setAiLoading(true); setAiError(false); setAiErrorMsg(''); setAiResult(null); setAiProgress(0);
    setDebugStatus('Sending request to proxy...'); setDebugElapsed(0); setDebugRaw(''); setDebugHttpStatus(null);
    const startedAt = Date.now();
    aiProgressTimer.current = setInterval(()=>{
      const pct = Math.min(99, Math.round(((Date.now()-startedAt)/45000)*100));
      setAiProgress(pct);
    }, 300);
    debugTimer.current = setInterval(()=>{
      setDebugElapsed(Math.floor((Date.now()-startedAt)/1000));
    }, 250);

    // 90s frontend watchdog — if the request hasn't resolved by then, abort it
    // so the button can never be stuck on "Analysing..." forever.
    const watchdog = setTimeout(()=>{ controller.abort(); }, 90000);

    try{
      const {regions, total_days} = buildRegionsFromItinerary(days, stateKey);
      const itinerary = {regions, total_days};
      const marketData = buildAIMarketSummary();
      const boardData = buildBoardDataSummary();
      setDebugStatus('Request sent — waiting for response...');
      const r = await fetch('/api/predict', {
        method: 'POST', headers: {'Content-Type':'application/json'},
        body: JSON.stringify({itinerary, marketData, boardData}),
        signal: controller.signal,
      });
      setDebugHttpStatus(r.status);
      setDebugStatus('Response received — parsing...');
      const rawText = await r.clone().text();
      setDebugRaw(rawText ? rawText : 'Empty response');
      const data = JSON.parse(rawText || '{}');
      if (data.error || !data.predictions){ setAiError(true); setDebugStatus('Error: ' + (data.error || 'no predictions returned')); }
      else {
        setAiResult(data);
        setDebugStatus('Done');
        const toSave = {
          fingerprint: currentFingerprint,
          products: allProducts,
          predictions: data.predictions,
          summary: data.summary || '',
          timestamp: new Date().toISOString(),
        };
        try{ localStorage.setItem(AI_PREDICTION_STORAGE_KEY, JSON.stringify(toSave)); } catch(e){}
        setSavedPrediction(toSave);
      }
    } catch(e){
      setDebugRaw(e.message || String(e));
      if (e.name === 'AbortError'){ setAiErrorMsg('Analysis timed out — please try again.'); setDebugStatus('Error: request timed out / aborted'); }
      else { setAiError(true); setDebugStatus('Error: ' + (e.message || String(e))); }
    }
    clearTimeout(watchdog);
    if (aiController.current === controller) aiController.current = null;
    clearInterval(aiProgressTimer.current);
    clearInterval(debugTimer.current);
    setDebugElapsed(Math.floor((Date.now()-startedAt)/1000));
    setAiProgress(100);
    setAiLoading(false);
  }

  function clearSavedPrediction(){
    try{ localStorage.removeItem(AI_PREDICTION_STORAGE_KEY); } catch(e){}
    setSavedPrediction(null);
    setAiResult(null);
    setAiError(false);
    setAiErrorMsg('');
  }

  // What to actually render: a fresh result from this session takes priority,
  // otherwise fall back to whatever was persisted in localStorage.
  const displayResult = aiResult || (savedPrediction ? {predictions: savedPrediction.predictions, summary: savedPrediction.summary} : null);

  // Day counts per state, for the coverage-summary table — the Builder
  // session is single-state, so every day-with-content counts against stateKey.
  const dayCountByState = {};
  if (stateKey) dayCountByState[stateKey] = totalDaysWithLocation;

  const cardHd = {fontSize:'12px',fontWeight:700,color:'#1c1917',marginBottom:'8px'};

  if (!hasEnoughData){
    return (
      <div style={{padding:'40px 20px',textAlign:'center',color:'#a8a29e',fontSize:'13px'}}>
        Add locations to your itinerary to see consumer analysis
      </div>
    );
  }

  return (
    <div style={{padding:'18px 20px',display:'flex',flexDirection:'column',gap:'20px',maxWidth:'1100px'}}>

      {/* ── Section 1: AI prediction (moved to top) ── */}
      <div>
        <div style={cardHd}>AI prediction — who should buy this itinerary?</div>
        <div style={{fontSize:'10px',color:'#a8a29e',marginTop:'-6px',marginBottom:'2px'}}>Forward-looking · Based on market gaps and tourism trends</div>
        {detectedStates.length ? (
          <div style={{fontSize:'10px',color:'#a8a29e',marginBottom:'2px'}}>Scoring across {detectedStates.join(' · ')}</div>
        ) : null}
        {isMultiState ? (
          <div style={{fontSize:'10px',color:'#B45309',marginBottom:'8px'}}>Multi-state itineraries may have lower prediction accuracy. Per-day state selection coming soon.</div>
        ) : (
          <div style={{marginBottom:'8px'}}/>
        )}
        <div style={{background:'#fff',border:'0.5px solid #e7e5e4',borderRadius:'10px',padding:'14px'}}>
          {showChangedBanner ? (
            <div style={{background:'#FEF3E2',border:'0.5px solid #F3D38A',borderRadius:'8px',padding:'10px 12px',marginBottom:'10px',fontSize:'12px',color:'#7A4A00'}}>
              Your itinerary has changed significantly. Re-analyse for updated predictions.
            </div>
          ) : null}

          <button
            onClick={runAiPrediction}
            disabled={!canAnalyse || aiLoading}
            title={aiLoading ? undefined : analyseTooltip}
            style={{...primaryBtn, width:'100%', padding:'10px 14px', fontSize:'13px',
              opacity:(!canAnalyse || aiLoading)?0.5:1, cursor:(!canAnalyse || aiLoading)?'not-allowed':'pointer',
              display:'flex', alignItems:'center', justifyContent:'center', gap:'8px'}}>
            {aiLoading ? (<><span className="ca-spinner"/>Analysing... (30-60 seconds)</>) : 'Analyse this itinerary'}
          </button>

          <div style={{display:'flex',justifyContent:'flex-end',marginTop:'4px'}}>
            <span onClick={()=>setDebugVisible(v=>!v)} style={{fontSize:'10px',color:'#a8a29e',cursor:'pointer',textDecoration:'underline'}}>{debugVisible?'Hide debug':'Show debug'}</span>
          </div>
          {debugVisible ? (
            <div style={{background:'#FFFBE6',border:'0.5px solid #F0E4A0',borderRadius:'6px',padding:'8px 10px',marginTop:'4px',fontFamily:'Consolas,Menlo,monospace',fontSize:'10px',color:'#57534e',lineHeight:1.6}}>
              <div><b>Status:</b> {debugStatus}</div>

          <div style={{display:'grid',gridTemplateColumns:'0.7fr 0.9fr repeat(5,1fr)',gap:'8px',padding:'8px 14px',background:'#f5f5f4',fontSize:'10px',fontWeight:700,textTransform:'uppercase',letterSpacing:'.04em'}}>
            <div>State</div><div>Days planned</div>

          </div>
          {statesUsed.map(s=>(
            <div key={s} style={{display:'grid',gridTemplateColumns:'0.7fr 0.9fr repeat(5,1fr)',gap:'8px',padding:'8px 14px',fontSize:'11px',borderTop:'0.5px solid #f0efed',alignItems:'center'}}>
              <div><span style={stateChipStyle(s,true)}>{s}</span></div>
              <div style={{color:'#57534e'}}>{dayCountByState[s]||0}</div>
              {sortedScores.map(sc=>{
                const pct = sc.statePct[s] || 0;
                const tourCount = Math.round(pct * sc.n);

}

function App(){
  const D = window.DATA_MODULE;
  const [err, setErr] = useState('');
  const [corrections, setCorrections] = useState(()=>{ try { return D.loadCorrections()||{}; } catch(e){ return {}; } });
  const catalog = useMemo(()=>{
    try { return D.resolveCatalog(corrections); }
    catch(e){ return D.CATALOG; }
  }, [corrections]);
  const THEMES = D.THEMES || [];
  // global template list (every scraped itinerary, cross-state), corrections applied per-day-state
  const allTemplatesGlobal = useMemo(()=>{
    try { return D.resolveTemplates ? D.resolveTemplates(corrections) : (D.TEMPLATES||[]); }
    catch(e){ return D.TEMPLATES||[]; }
  }, [corrections]);
  function prodInfo(state, name){ const c=catalog[state]; return (c&&c.products) ? c.products[name] : null; }
  function cityOfIn(state, name){ const c=catalog[state]; return (c&&c.cities&&c.cities[name]) || (c&&c.name) || state; }

  const stateKeys = Object.keys(catalog);
  const [view, setView]       = useState('builder');
  const [stateKey, setStateKey] = useState(stateKeys[0] || 'WA');
  const cur = catalog[stateKey] || {products:{},templates:[],allRows:[],cities:{},name:stateKey,abbr:stateKey,seed:{tourName:'',duration:5,days:[]}};

  const [tourName, setTourName] = useState('');
  const [tourUrl, setTourUrl]   = useState('');
  const [tourSource, setTourSource] = useState('');
  const [duration, setDuration] = useState(5);
  const [dragIdx, setDragIdx] = useState(null);
  const [overIdx, setOverIdx] = useState(null);
  const [days, setDays]         = useState([]);
  const [activeDay, setActiveDay] = useState(0);
  const [builderSubTab, setBuilderSubTab] = useState('build'); // 'build' | 'consumer'

  const [suggestTab, setSuggestTab] = useState('popular');
  const [suggestSearch, setSuggestSearch] = useState('');
  const [sourcePopup, setSourcePopup] = useState(null); // product name currently showing its source popup, or null
  const [themeInputs, setThemeInputs] = useState({});
  const [draftBanner, setDraftBanner] = useState(null); // {market,state,days} while a generated draft is loaded, or null

  // ---- templates tab filters (operate on the global cross-state template list) ----
  const [tplSourceFilter, setTplSourceFilter] = useState('all');      // all | Competitor | Board
  const [tplStateFilter, setTplStateFilter]   = useState([]);         // multi-select, OR-combined
  const [tplLocationFilter, setTplLocationFilter] = useState('');     // market / sourceLocation, single
  const [tplThemeFilter, setTplThemeFilter]   = useState([]);         // multi-select, AND-combined
  const [tplSourceNameFilter, setTplSourceNameFilter] = useState([]); // multi-select, OR-combined
  const [tplSearch, setTplSearch]             = useState('');
  const [tplExactMatch, setTplExactMatch]     = useState(null); // {name, source} — set when arriving from an exact-row click (e.g. Market Intelligence table)
  const [tplRouteFilter, setTplRouteFilter]   = useState([]);         // route cities/places, AND-combined ("must visit all")
  const [tplDurMin, setTplDurMin] = useState(1);
  const [tplDurMax, setTplDurMax] = useState(30);
  const [tplSortBy, setTplSortBy] = useState('pop');                  // pop | dur-d | dur-a | board
  const [routeSearch, setRouteSearch] = useState('');
  const [previewTpl, setPreviewTpl]   = useState(null);
  const [confirmTpl, setConfirmTpl]   = useState(null);

  const allTpls = allTemplatesGlobal;

  function tplThemesOf(t){
    const s = new Set(t.themes||[]);
    (t.days||[]).forEach(d=>{
      (d.themes||[]).forEach(x=>s.add(x));
      (d.places||[]).forEach(p=>{ const info=prodInfo(d.state,p); if(info)(info.t||[]).forEach(x=>s.add(x)); });
    });
    return s;
  }

  // derived filter options — must live at App level (no hooks inside render fns)
  const routePlaceOptions = useMemo(()=>{
    const s=new Set();
    allTpls.forEach(t=>(t.days||[]).forEach(d=>{ if(d.city) s.add(d.city); (d.places||[]).forEach(p=>s.add(p)); }));
    return [...s].sort();
  }, [allTpls]);
  const routeSearchOptions = useMemo(()=>{
    if(!routeSearch.trim()) return routePlaceOptions.slice(0,40);
    const q = routeSearch.toLowerCase();
    return routePlaceOptions.filter(c => c.toLowerCase().includes(q)).slice(0,40);
  }, [routeSearch, routePlaceOptions]);
  const tplThemeOptions = useMemo(()=>{
    const s=new Set(); allTpls.forEach(t=>tplThemesOf(t).forEach(x=>s.add(x)));
    return THEMES.filter(t=>s.has(t));
  }, [allTpls]);
  const tplSourceOptions = useMemo(()=>{
    const s=new Set(); allTpls.forEach(t=>{ if(t.source) s.add(t.source); }); return [...s].sort();
  }, [allTpls]);
  const tplLocationOptions = useMemo(()=>{
    const s=new Set(); allTpls.forEach(t=>{ if(t.sourceLocation) s.add(t.sourceLocation); }); return [...s].sort();
  }, [allTpls]);

  const tplsFiltered = useMemo(()=>{
    if(tplExactMatch){
      return allTpls.filter(t=>t.name===tplExactMatch.name && t.source===tplExactMatch.source);
    }
    const q=(tplSearch||'').toLowerCase().trim();
    let list = allTpls.filter(t=>{
      if(tplSourceFilter==='Competitor'&&t.type!=='Competitor') return false;
      if(tplSourceFilter==='Board'&&t.type!=='Board') return false;
      if(tplLocationFilter && t.sourceLocation !== tplLocationFilter) return false;
      if(tplSourceNameFilter.length && !tplSourceNameFilter.includes(t.source)) return false;
      if(tplStateFilter.length && !tplStateFilter.some(s=>(t.states||[]).includes(s))) return false;
      if(tplThemeFilter.length){
        const allT=tplThemesOf(t);
        if(!tplThemeFilter.every(th=>allT.has(th))) return false;
      }
      if(tplRouteFilter.length > 0){
        const allPlaces = new Set();
        (t.days||[]).forEach(d=>{ if(d.city) allPlaces.add(d.city); (d.places||[]).forEach(p=>allPlaces.add(p)); });
        if(!tplRouteFilter.every(p=>allPlaces.has(p))) return false;
      }
      const dur = (t.days||[]).length;
      if(dur < tplDurMin || dur > tplDurMax) return false;
      if(q){ const hay=(t.name+' '+(t.source||'')+' '+(t.desc||'')).toLowerCase(); if(!hay.includes(q)) return false; }
      return true;
    });
    const boardPctOf = (t)=>{
      let board=0, resolved=0;
      (t.days||[]).forEach(d=>(d.places||[]).forEach(p=>{ const info=prodInfo(d.state,p); if(info){ resolved++; if(info.board) board++; } }));
      return resolved? board/resolved : 0;
    };
    list = list.slice();
    if(tplSortBy==='pop') list.sort((a,b)=>(b.pop||0)-(a.pop||0));
    else if(tplSortBy==='dur-a') list.sort((a,b)=>(a.days||[]).length-(b.days||[]).length);
    else if(tplSortBy==='dur-d') list.sort((a,b)=>(b.days||[]).length-(a.days||[]).length);
    else if(tplSortBy==='board') list.sort((a,b)=>boardPctOf(b)-boardPctOf(a));
    return list;
  }, [allTpls, tplSourceFilter, tplStateFilter, tplThemeFilter, tplSearch, tplRouteFilter, tplLocationFilter, tplSourceNameFilter, tplDurMin, tplDurMax, tplSortBy, catalog, tplExactMatch]);

  const [dataFilter, setDataFilter] = useState('all');
  const [dataSearch, setDataSearch] = useState('');
  const [dataPage, setDataPage]     = useState(0);

  const [saved, setSaved]       = useState([]);
  const [savedLoading, setSavedLoading] = useState(false);
  const [toast, setToast]       = useState('');
  const toastTimer = useRef(null);

  // ---- helpers ----
  const cityOf = (name) => (cur.cities && cur.cities[name]) || cur.name;
  const blankDay = () => ({location:'',city:'',desc:'',title:'',products:[],customThemes:[],removedThemes:[]});

  function seedDays(c){
    const s = c.seed || {tourName:'',duration:5,days:[]};
    const d = (s.days||[]).map(x => ({
      location:x.location||'', city:(c.cities && c.cities[(x.products||[])[0]])||'',
      desc:x.desc||'', products:[...(x.products||[])], customThemes:[], removedThemes:[]
    }));
    while (d.length < (s.duration||5)) d.push(blankDay());
    return {days:d, dur:(s.duration||5), name:s.tourName||''};
  }

  // initialise / reset when state changes
  useEffect(()=>{
    const {days:d, dur, name} = seedDays(cur);
    setDays(d); setDuration(dur); setTourName(name); setTourUrl(''); setActiveDay(0);
  // eslint-disable-next-line
  }, [stateKey]);

  // re-sync corrections when tab regains focus (token editor edits reflect live)
  useEffect(()=>{
    const onVis = ()=>{ if (document.visibilityState==='visible'){ try{ setCorrections(D.loadCorrections()||{}); }catch(e){} } };
    const onStore = (e)=>{ if(!e.key || e.key===D.STORAGE_KEY){ try{ setCorrections(D.loadCorrections()||{}); }catch(e){} } };
    document.addEventListener('visibilitychange', onVis);
    window.addEventListener('storage', onStore);
    return ()=>{ document.removeEventListener('visibilitychange', onVis); window.removeEventListener('storage', onStore); };
  }, []);

  function showToast(msg){ setToast(msg); clearTimeout(toastTimer.current); toastTimer.current=setTimeout(()=>setToast(''),2600); }

  function dayThemesAuto(d){
    const s = new Set();
    (d.products||[]).forEach(p=>{ const x=cur.products[p]; if(x&&x.t) x.t.forEach(t=>s.add(t)); });
    return THEMES.filter(t=>s.has(t));
  }
  function dayThemesDisplay(d){
    const auto = dayThemesAuto(d).filter(t=>!(d.removedThemes||[]).includes(t));
    const custom = (d.customThemes||[]).filter(t=>!auto.includes(t));
    return [...auto, ...custom];
  }

  // ---- day actions ----
  const setDur = (n)=>{
    n = Math.max(2, Math.min(14, n));
    setDays(prev=>{ const a=prev.slice(); while(a.length<n)a.push(blankDay()); while(a.length>n)a.pop(); return a; });
    setDuration(n); setActiveDay(a=>Math.min(a,n-1));
  };
  const addDay = ()=>{
    setDays(prev=>{ const a=[...prev, blankDay()]; setDuration(a.length); return a; });
    setActiveDay(days.length);
  };
  const clearAll = ()=>{
    if(!window.confirm('Are you sure? This will remove all days and products.')) return;
    setTourName(''); setTourUrl(''); setTourSource(''); setDuration(1); setDays([blankDay()]); setActiveDay(0);
    setDraftBanner(null);
  };
  const removeDay = (i)=>{
    setDays(prev=>{
      if (prev.length<=1) return prev;
      const a = prev.filter((_,k)=>k!==i);
      setDuration(a.length);
      return a;
    });
    setActiveDay(a=>Math.max(0, Math.min(a, days.length-2)));
  };
  const reorderDay = (from, to)=>{
    if (from===to) return;
    setDays(prev=>{
      const a = prev.slice();
      const [moved] = a.splice(from,1);
      a.splice(to,0,moved);
      return a;
    });
    setActiveDay(a=> a===from? to : a>from&&a<=to? a-1 : a<from&&a>=to? a+1 : a);
  };
  const setLocation = (i,val)=> setDays(prev=>prev.map((d,k)=>k===i?{...d,location:val}:d));
  const setDesc     = (i,val)=> setDays(prev=>prev.map((d,k)=>k===i?{...d,desc:val}:d));
  const setDayTitle = (i,val)=> setDays(prev=>prev.map((d,k)=>k===i?{...d,title:val}:d));
  const toggleProduct = (name)=> setDays(prev=>prev.map((d,k)=>{
    if(k!==activeDay) return d;
    const has=d.products.includes(name);
    return {...d, products: has? d.products.filter(p=>p!==name):[...d.products,name]};
  }));
  const removeProduct = (i,name)=> setDays(prev=>prev.map((d,k)=>k===i?{...d,products:d.products.filter(p=>p!==name)}:d));
  const addCustomTheme = (i,theme)=>{ const t=(theme||'').trim(); if(!t) return; setDays(prev=>prev.map((d,k)=>{
    if(k!==i) return d; if(dayThemesDisplay(d).includes(t)) return d; return {...d, customThemes:[...(d.customThemes||[]),t]};
  })); };
  const removeTheme = (i,theme)=> setDays(prev=>prev.map((d,k)=>{
    if(k!==i) return d;
    return {...d, customThemes:(d.customThemes||[]).filter(t=>t!==theme), removedThemes:[...new Set([...(d.removedThemes||[]),theme])]};
  }));

  // ---- templates ----
  function loadTemplate(t){
    // A tour can cross states; each day resolves its city name against its own
    // day-state's catalog (not the Builder's currently-selected state).
    const d = (t.days||[]).map(x=>({
      location: '', city: x.title||cityOfIn(x.state, (x.places||[])[0])||'', desc:x.desc||'',
      products:[...(x.places||[])], customThemes:[], removedThemes:[]
    }));
    // The Builder itself stays single-state per session — seed it with the
    // template's primary (first-visited) state.
    const targetState = (t.states && t.states[0]) || stateKeys[0];
    // Always set view first, then use setTimeout so the seed-reset effect
    // (triggered by setStateKey or initial mount) never wins over our data.
    setView('builder');
    setStateKey(targetState);
    setTimeout(()=>{ setTourName(''); setTourUrl(t.url||''); setTourSource(t.source||''); setDuration(d.length); setDays(d); setActiveDay(0); setDraftBanner(null); }, 0);
    showToast('Loaded template · '+(t.name||''));
  }

  // ---- 3b: rule-based draft generator (client-side only, no API calls) ----
  // Builds a day-by-day skeleton from board data for a given market+state insight card:
  // Day 1 / last day = the state's most common board arrival city (no products — PM fills these in);
  // middle days = the missing-products list (board-promoted, not sold by this market's competitors)
  // spread 1-2 per day, in board-frequency order, over whatever days are left.
  function generateDraftFromInsight(market, state, enr){
    const duration = Math.max(2, Math.round(enr.avgDur||3));
    const arrivalCity = enr.arrivalCity || state;
    const missing = enr.missingProductsAll && enr.missingProductsAll.length ? enr.missingProductsAll : enr.missingProducts;

    const d = [];
    d.push({location:'', city:arrivalCity, desc:'', title:'', products:[], customThemes:[], removedThemes:[]});
    const middleCount = Math.max(0, duration-2);
    if (middleCount > 0){
      // one or two of the highest board-frequency missing products per day — not the whole tail
      const perDay = Math.min(2, Math.max(1, Math.ceil(Math.min(missing.length, middleCount*2) / middleCount)));
      let idx = 0;
      for (let i=0;i<middleCount;i++){
        const slice = missing.slice(idx, idx+perDay);
        idx += perDay;
        d.push({location:'', city:arrivalCity, desc:'', title:'', products:slice, customThemes:[], removedThemes:[]});
      }
    }

  function buildTplCard(t, maxPop){
    const allProds = []; const seenProds = new Set();
    (t.days||[]).forEach(d=>(d.places||[]).forEach(p=>{ if(!seenProds.has(p)){ seenProds.add(p); allProds.push(p); } }));
    const allThemes = [...tplThemesOf(t)];
    let board=0, resolved=0;
    (t.days||[]).forEach(d=>(d.places||[]).forEach(p=>{ const info=prodInfo(d.state,p); if(info){ resolved++; if(info.board) board++; } }));
    const boardPct = resolved? Math.round(board/resolved*100) : 0;
    const uniqStates=[...new Set(t.states||[])];
    return {
      t, isBoard:t.type==='Board', dur:(t.days||[]).length, prodCount:allProds.length, allProds, allThemes,
      themeCount:allThemes.length, boardPct, boardColor: boardPct>=70?'#27500A':boardPct>=50?'#92400E':'#991B1B',
      uniqStates, isMultiState: uniqStates.length>1, isTop:(t.pop||0)>=maxPop*0.6,
      popPct: Math.round((t.pop||0)/maxPop*100),
    };
  }

  function buildTplPreview(t){
    const allProds=[]; const seen=new Set();
    (t.days||[]).forEach(d=>(d.places||[]).forEach(p=>{ if(!seen.has(p)){ seen.add(p); allProds.push(p); } }));
    const allThemes=[...tplThemesOf(t)];
    const themeDays={};
    (t.days||[]).forEach(d=>{
      const dThemes=new Set(d.themes||[]);
      (d.places||[]).forEach(p=>{ const info=prodInfo(d.state,p); if(info)(info.t||[]).forEach(x=>dThemes.add(x)); });
      dThemes.forEach(th=>{ themeDays[th]=(themeDays[th]||0)+1; });
    });
    const maxThemeDays = Math.max(1, ...Object.values(themeDays).concat([0]));
    const insightThemes = THEMES.filter(th=>themeDays[th]).map(th=>({label:th,count:themeDays[th],pct:Math.round(themeDays[th]/maxThemeDays*100)}));
    const missingThemes = THEMES.filter(th=>!themeDays[th]);
    const stateDays={};
    (t.days||[]).forEach(d=>{ if(d.state) stateDays[d.state]=(stateDays[d.state]||0)+1; });
    const insightStates = Object.entries(stateDays).map(([s,count])=>({state:s,count}));
    const prodDays={};
    (t.days||[]).forEach(d=>(d.places||[]).forEach(p=>{ prodDays[p]=(prodDays[p]||0)+1; }));
    const totalDays=(t.days||[]).length||1;
    const topProducts = Object.entries(prodDays).sort((a,b)=>b[1]-a[1]).slice(0,7).map(([label,days])=>({label,days,pct:Math.round(days/totalDays*100)}));
    return {allProds, allThemes, insightThemes, missingThemes, insightStates, topProducts};
  }

        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',gap:'8px'}}>
          <span style={{fontSize:'12px',color:'#57534e'}}>{cards.length} of {allTpls.length} itineraries</span>
          {hasActiveFilters? <button onClick={clearAll} style={{...ghostBtn,padding:'4px 10px',fontSize:'11px'}}>✕ Clear filters</button>:null}
        </div>

        {cards.length? (
          <div style={{display:'grid',gridTemplateColumns:'repeat(2,1fr)',gap:'10px',alignItems:'start'}}>
            {cards.map((c,i)=>{
              const t=c.t;
              return (
              <div key={t.url||i} style={{background:'#fff',border:'0.5px solid #e7e5e4',borderRadius:'10px',overflow:'hidden'}}>

                <div style={{padding:'11px 13px',borderBottom:'0.5px solid #f5f5f4'}}>
                  <div style={{fontSize:'13px',fontWeight:700,lineHeight:1.3,marginBottom:'3px'}}>{t.name}</div>
                  <div style={{display:'flex',alignItems:'center',gap:'6px',flexWrap:'wrap'}}>
                    <span style={chip(c.isBoard?'board':'prod',{small:true})}>{t.type}</span>
                    <span style={{fontSize:'11px',color:'#a8a29e'}}>{t.source}</span>
                    {t.url? <a href={t.url} target="_blank" rel="noopener" style={{fontSize:'11px',color:'#185FA5',textDecoration:'none',fontWeight:500}}>original ↗</a>:null}
                  </div>
                  <div style={{display:'flex',flexWrap:'wrap',gap:'3px',marginTop:'5px'}}>
                    {c.uniqStates.map(s=><span key={s} style={stateChipStyle(s,true)}>{s}</span>)}
                    {c.isMultiState? <span style={{display:'inline-flex',alignItems:'center',fontSize:'10px',fontWeight:600,color:'#5B21B6',background:'#EDE9FE',border:'0.5px solid #DDD6FE',borderRadius:'3px',padding:'1px 6px'}}>Multi-state</span>:null}
                    {c.isTop? <span style={{display:'inline-flex',alignItems:'center',gap:'2px',fontSize:'10px',fontWeight:600,color:'#27500A',background:'#EAF3DE',border:'0.5px solid #C0DD97',borderRadius:'3px',padding:'1px 6px'}}>★ Popular</span>:null}
                  </div>
                </div>

                <div style={{display:'flex',alignItems:'stretch',borderBottom:'0.5px solid #f5f5f4',background:'#fafaf9'}}>
                  {[['Days',c.dur],['Products',c.prodCount],['Themes',c.themeCount+'/'+THEMES.length]].map(([label,val])=>(
                    <React.Fragment key={label}>
                      <div style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',padding:'8px 4px',gap:'1px'}}>
                        <div style={{fontSize:'17px',fontWeight:700}}>{val}</div>
                        <div style={{fontSize:'9px',color:'#a8a29e',textTransform:'uppercase',letterSpacing:'.05em'}}>{label}</div>
                      </div>
                      <div style={{width:'0.5px',background:'#e7e5e4'}}/>
                    </React.Fragment>
                  ))}
                  <div style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',padding:'8px 4px',gap:'1px'}}>
                    <div style={{fontSize:'17px',fontWeight:700,color:c.boardColor}}>{c.boardPct}%</div>
                    <div style={{fontSize:'9px',color:'#a8a29e',textTransform:'uppercase',letterSpacing:'.05em'}}>Board</div>
                  </div>
                  <div style={{flex:2,padding:'8px 10px',display:'flex',flexDirection:'column',gap:'4px',justifyContent:'center',borderLeft:'0.5px solid #e7e5e4'}}>
                    <div style={{display:'flex',justifyContent:'space-between',fontSize:'9px',color:'#a8a29e'}}><span>Popularity</span><span>{t.pop||0}</span></div>
                    <Bar pct={c.popPct} color="#1D9E75"/>
                    <div style={{fontSize:'9px',color:'#a8a29e'}}>Board alignment</div>
                    <Bar pct={c.boardPct} color={c.boardPct>=70?'#1D9E75':c.boardPct>=50?'#F59E0B':'#EF4444'}/>
                  </div>
                </div>

                {c.allProds.length? (
                  <div style={{padding:'9px 13px',borderBottom:'0.5px solid #f5f5f4'}}>
                    <div style={{fontSize:'9px',fontWeight:600,color:'#a8a29e',textTransform:'uppercase',letterSpacing:'.06em',marginBottom:'5px'}}>Top products</div>
                    <div style={{display:'flex',flexWrap:'wrap',gap:'3px'}}>
                      {c.allProds.slice(0,5).map(p=><span key={p} style={chip('prod',{small:true})}>{p}</span>)}
                      {c.allProds.length>5? <span style={{fontSize:'10px',color:'#a8a29e',padding:'2px 4px'}}>+{c.allProds.length-5} more</span>:null}
                    </div>
                  </div>
                ):null}

                {c.allThemes.length? (
                  <div style={{padding:'9px 13px',borderBottom:'0.5px solid #f5f5f4'}}>
                    <div style={{fontSize:'9px',fontWeight:600,color:'#a8a29e',textTransform:'uppercase',letterSpacing:'.06em',marginBottom:'5px'}}>Themes</div>
                    <div style={{display:'flex',flexWrap:'wrap',gap:'3px'}}>
                      {c.allThemes.slice(0,4).map(x=><span key={x} style={chip('theme',{small:true})}>{x}</span>)}
                      {c.allThemes.length>4? <span style={{fontSize:'10px',color:'#a8a29e',padding:'2px 4px'}}>+{c.allThemes.length-4} more</span>:null}
                    </div>
                  </div>
                ):null}

                <div style={{padding:'10px 13px',display:'flex',alignItems:'center',gap:'8px'}}>
                  <div style={{display:'flex',alignItems:'center',gap:'5px',padding:'7px 10px',borderRadius:'6px',fontSize:'12px',fontWeight:600,background:'#EAF3DE',color:'#27500A',border:'0.5px solid #C0DD97',cursor:'pointer',flex:1,justifyContent:'center'}} onClick={()=>setConfirmTpl(t)}>Start from this</div>
                  <div style={{display:'flex',alignItems:'center',gap:'5px',padding:'7px 10px',borderRadius:'6px',fontSize:'12px',border:'0.5px solid #d6d3d1',color:'#57534e',cursor:'pointer',whiteSpace:'nowrap',flex:1,justifyContent:'center'}} onClick={()=>setPreviewTpl(t)}>Preview</div>
                </div>

              </div>);
            })}
          </div>
        ) : (
          <div style={{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:'60px 20px',gap:'12px',background:'#fff',borderRadius:'10px',border:'0.5px solid #e7e5e4'}}>
            <div style={{fontSize:'14px',fontWeight:600,color:'#57534e'}}>No templates match your filters</div>
            <div style={{fontSize:'12px',color:'#a8a29e',textAlign:'center'}}>Try removing some place or theme filters — multi-state tours cover many cities</div>
            <button onClick={clearAll} style={{...ghostBtn,padding:'7px 14px'}}>Clear all filters</button>
          </div>
        )}

      </div>
    </div>);
  }

  function renderInsights(){
    const allSorted = entries.slice().sort((a,b)=>b[1].pop-a[1].pop).slice(0,30);
    const maxAll = allSorted.length?allSorted[0][1].pop:1;
    return (
    <div style={{padding:'14px 16px',display:'flex',flexDirection:'column',gap:'6px'}}>
      <div style={{fontSize:'11px',color:'#57534e',marginBottom:'6px'}}>Top products in {cur.name} by number of tours that include them.</div>
      {allSorted.map(([name,info])=>(
        <div key={name} style={{display:'flex',alignItems:'center',gap:'10px',padding:'4px 0'}}>
          <div style={{width:'220px',fontSize:'12px',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{name}</div>
          <span style={chip(info.issue?'flag':(info.board?(info.op?'prod':'board'):'theme'),{small:true})}>{info.issue?'Needs cleanup':(info.board?(info.op?'Both':'Board only'):'Operators')}</span>
          <Bar pct={Math.round(info.pop/maxAll*100)} color={info.issue?'#D98A74':'#378ADD'}/>
          <div style={{fontSize:'11px',color:'#a8a29e',minWidth:'30px',textAlign:'right'}}>{info.pop}</div>
        </div>
      ))}
    </div>);
  }

  function renderGap(){
    const boardOnly = cleanEntries.filter(e=>e[1].board&&!e[1].op).sort((a,b)=>b[1].pop-a[1].pop);
    const both      = cleanEntries.filter(e=>e[1].board&&e[1].op).sort((a,b)=>b[1].pop-a[1].pop);
    const opOnly    = cleanEntries.filter(e=>!e[1].board&&e[1].op).sort((a,b)=>b[1].pop-a[1].pop);
    const col = (title, sub, arr, kind)=>(
      <div style={{flex:1,minWidth:'220px',background:'#fff',border:'0.5px solid #e7e5e4',borderRadius:'10px',padding:'12px',display:'flex',flexDirection:'column',gap:'8px'}}>
        <div><div style={{fontSize:'12px',fontWeight:600}}>{title} <span style={{color:'#a8a29e'}}>({arr.length})</span></div><div style={{fontSize:'10px',color:'#57534e'}}>{sub}</div></div>
        <div style={{display:'flex',flexWrap:'wrap',gap:'5px'}}>{arr.slice(0,40).map(([n])=><span key={n} onClick={()=>{setView('builder');toggleProduct(n);}} style={chip(kind,{cursor:'pointer',small:true})}>{n}</span>)}</div>
      </div>);
    return (
    <div style={{padding:'14px 16px',display:'flex',gap:'10px',flexWrap:'wrap'}}>
      {col('Board only','Promoted by tourism board, not sold by operators', boardOnly,'board')}
      {col('Both','Aspirational AND commercial — safe anchors', both,'prod')}
      {col('Operators only','Sold by operators, board ignores', opOnly,'theme')}
    </div>);
  }

  function renderData(){
    const rows = cur.allRows||[];
    const dq=(dataSearch||'').toLowerCase().trim();
    const filtered = rows.filter(r=>{
      if(dataFilter==='board'&&r.type!=='Board') return false;
      if(dataFilter==='comp'&&r.type!=='Competitor') return false;
      if(dq){ const hay=(r.tour+' '+r.source+' '+r.city+' '+r.location+' '+r.products+' '+r.themes).toLowerCase(); if(!hay.includes(dq)) return false; }
      return true;
    });
    const PER=50; const pages=Math.max(1,Math.ceil(filtered.length/PER)); const pg=Math.min(dataPage,pages-1);
    const slice=filtered.slice(pg*PER,pg*PER+PER);
    return (
    <div style={{padding:'14px 16px',display:'flex',flexDirection:'column',gap:'10px'}}>
      <div style={{display:'flex',gap:'8px',alignItems:'center',flexWrap:'wrap'}}>
        {[['all','All sources'],['board','Board'],['comp','Competitor']].map(([k,l])=>(
          <button key={k} onClick={()=>{setDataFilter(k);setDataPage(0);}} style={{padding:'5px 11px',fontSize:'11px',fontWeight:600,borderRadius:'6px',cursor:'pointer',border:'0.5px solid '+(dataFilter===k?'#C0DD97':'#d6d3d1'),background:dataFilter===k?TINT:'#fff',color:dataFilter===k?'#27500A':'#57534e'}}>{l}</button>
        ))}
        <input value={dataSearch} onChange={e=>{setDataSearch(e.target.value);setDataPage(0);}} placeholder="Search rows…" style={{border:'0.5px solid #d6d3d1',borderRadius:'6px',padding:'5px 9px',fontSize:'11px',flex:1,minWidth:'160px'}}/>
      </div>
      <div style={{fontSize:'11px',color:'#a8a29e'}}>{filtered.length?('Showing '+(pg*PER+1)+'–'+(pg*PER+slice.length)+' of '+filtered.length+' rows'):'No rows match'}</div>
      <div style={{overflowX:'auto',border:'0.5px solid #e7e5e4',borderRadius:'8px'}}>
        <table style={{width:'100%',borderCollapse:'collapse',fontSize:'11px'}}>
          <thead><tr style={{background:'#fafaf9',textAlign:'left'}}>{['Tour','Source','Day','City','Location / product','Themes'].map(h=><th key={h} style={th}>{h}</th>)}</tr></thead>
          <tbody>{slice.map((r,i)=>(
            <tr key={i} style={{background:i%2?'#fafaf9':'#fff'}}>
              <td style={td}>{r.url?<a href={r.url} target="_blank" rel="noopener" style={{color:'#185FA5',textDecoration:'none'}}>{r.tour}</a>:r.tour}</td>
              <td style={td}><span style={chip(r.type==='Board'?'board':'prod',{small:true})}>{r.source}</span></td>
              <td style={td}>{r.day}</td><td style={td}>{r.city}</td>
              <td style={Object.assign({},td,{color:'#0C447C',fontWeight:600})}>{r.location||r.products}</td>
              <td style={Object.assign({},td,{color:'#57534e'})}>{r.themes}</td>
            </tr>))}</tbody>
        </table>
      </div>
      <div style={{display:'flex',gap:'8px',alignItems:'center',justifyContent:'flex-end'}}>
        <button onClick={()=>setDataPage(Math.max(0,pg-1))} disabled={pg<=0} style={pagerBtn(pg>0)}>‹ Prev</button>
        <span style={{fontSize:'11px',color:'#a8a29e'}}>Page {pg+1} of {pages}</span>
        <button onClick={()=>setDataPage(Math.min(pages-1,pg+1))} disabled={pg>=pages-1} style={pagerBtn(pg<pages-1)}>Next ›</button>
      </div>
    </div>);
  }

  function renderSaved(){
    if(savedLoading) return <div style={empty}>Loading…</div>;
    if(!saved.length) return <div style={empty}>No saved itineraries yet. Build one and click <b>Save</b>.</div>;
    return (
    <div style={{padding:'14px 16px',display:'flex',flexDirection:'column',gap:'10px'}}>
      {saved.slice().reverse().map(sv=>{
        const allThemes=new Set(); (sv.days||[]).forEach(d=>(d.themes||[]).forEach(t=>allThemes.add(t)));
        return (
        <div key={sv.id} style={{background:'#fff',border:'0.5px solid #e7e5e4',borderRadius:'10px',padding:'12px 14px',display:'flex',justifyContent:'space-between',alignItems:'center',gap:'10px',flexWrap:'wrap'}}>
          <div style={{flex:1,minWidth:'200px'}}>
            <div style={{fontSize:'13px',fontWeight:600}}>{sv.name}</div>
            <div style={{fontSize:'11px',color:'#57534e',marginTop:'2px'}}>{(catalog[sv.state]||{}).name||sv.state} · {sv.duration} days · saved {(sv.savedAt||'').replace('T',' @ ')}</div>
            <div style={{display:'flex',flexWrap:'wrap',gap:'5px',marginTop:'6px'}}>{[...allThemes].slice(0,6).map(t=><span key={t} style={chip('theme',{small:true})}>{t}</span>)}</div>
          </div>
          <div style={{display:'flex',gap:'8px'}}>
            <button onClick={()=>loadSavedItinerary(sv)} style={primaryBtn}>Load</button>
            <button onClick={()=>deleteSaved(sv.id)} style={dangerBtn}>Delete</button>
          </div>
        </div>);
      })}
    </div>);
  }

  const viewBody = {builder:renderBuilder, templates:renderTemplates, insights:renderInsights, gap:renderGap, data:renderData, saved:renderSaved, analytics:()=><AnalyticsView catalog={catalog} THEMES={THEMES}/>, market:()=><MarketIntelligenceView
        catalog={catalog} allTemplatesGlobal={allTemplatesGlobal}
        onGoToTemplate={(name,source)=>{ setTplExactMatch({name, source}); setTplSearch(''); setView('templates'); }}
        onGoToTemplateFiltered={({state, sourceType})=>{
          setTplExactMatch(null); setTplSearch('');
          setTplStateFilter(state? [state] : []);
          setTplSourceFilter(sourceType || 'all');
          setView('templates');
        }}
        onGenerateDraft={generateDraftFromInsight}/>}[view];

  return (
  <div style={{display:'flex',width:'100%',height:'100vh',border:'0.5px solid #e7e5e4',overflow:'hidden',background:'#fafaf9'}}>
    {/* sidebar */}
    <div style={{width:'196px',minWidth:'196px',background:'#fff',borderRight:'0.5px solid #e7e5e4',padding:'14px 12px',display:'flex',flexDirection:'column',gap:'12px',overflowY:'auto'}}>
      <div style={{fontSize:'14px',fontWeight:600,display:'flex',alignItems:'center',gap:'6px'}}>
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke={ACCENT} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0Z"/><circle cx="12" cy="10" r="3"/></svg> Tour Builder
      </div>
      <hr style={hr}/>
      <div style={{display:'flex',flexDirection:'column',gap:'2px'}}>
        {NAV.map(([k,l])=><div key={k} onClick={()=>setView(k)} style={navStyle(k)}>{l}</div>)}
      </div>
      <hr style={hr}/>
      <div style={{padding:'4px 0'}}><Label>Tours in dataset</Label><div style={{fontSize:'18px',fontWeight:600}}>{totalTours.toLocaleString()}</div></div>
      <div style={{padding:'4px 0'}}><Label>Distinct products</Label><div style={{fontSize:'18px',fontWeight:600}}>{distinctProducts.toLocaleString()}</div></div>
      <div style={{padding:'4px 0'}}><Label>Day rows</Label><div style={{fontSize:'18px',fontWeight:600}}>{totalRows.toLocaleString()}</div></div>
    </div>

    {/* main */}
    <div style={{flex:1,display:'flex',flexDirection:'column',minWidth:0}}>
      <div style={{background:'#fff',borderBottom:'0.5px solid #e7e5e4',padding:'12px 16px',display:'flex',alignItems:'center',justifyContent:'space-between',gap:'12px'}}>
        <div>
          <div style={{fontSize:'16px',fontWeight:600}}>{topTitle}</div>
          <div style={{fontSize:'11px',color:'#57534e',marginTop:'1px'}}>{topSub}</div>
          {view==='builder'? <div style={{fontSize:'10px',color:'#a8a29e',marginTop:'2px'}}>Start from Opportunities for AI-assisted drafts</div>:null}
        </div>
        <div style={{display:'flex',gap:'8px'}}>
          {view==='builder'? <button onClick={clearAll} style={{padding:'6px 12px',borderRadius:'6px',fontSize:'12px',fontWeight:600,background:'transparent',color:'#78716c',border:'0.5px solid #d6d3d1',cursor:'pointer'}}>Clear all</button>:null}
          {view==='builder'? <button onClick={saveItinerary} style={primaryBtn}>Save</button>:null}
          <button onClick={exportWord} style={{display:'flex',alignItems:'center',gap:'5px',padding:'6px 11px',borderRadius:'6px',fontSize:'12px',background:TINT,color:'#27500A',border:'0.5px solid #C0DD97',cursor:'pointer'}}>↓ Export</button>
        </div>
      </div>
      {view==='builder' && draftBanner && (
        <div style={{background:TINT,borderBottom:'0.5px solid #C0DD97',padding:'8px 16px',display:'flex',alignItems:'center',justifyContent:'space-between',gap:'12px'}}>
          <div style={{fontSize:'12px',color:'#27500A'}}>
            Draft generated for {draftBanner.market} market · {draftBanner.state} · {draftBanner.days} days · Based on board data
          </div>
          <div onClick={()=>setDraftBanner(null)} title="Dismiss" style={{cursor:'pointer',color:'#27500A',fontSize:'14px',lineHeight:1,padding:'0 2px'}}>×</div>
        </div>
      )}
      {view==='builder' && (
        <div style={{background:'#fff',borderBottom:'0.5px solid #e7e5e4',padding:'10px 16px',display:'flex',flexDirection:'column',gap:'8px'}}>
          {/* controls row */}
          <div style={{display:'flex',gap:'10px',alignItems:'flex-end',flexWrap:'wrap'}}>
            <div style={{display:'flex',flexDirection:'column',gap:'4px',flex:1,minWidth:'200px'}}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',gap:'8px'}}>
                <Label>Tour name</Label>
                {tourUrl ? <a href={tourUrl} target="_blank" rel="noopener" style={{fontSize:'11px',color:'#185FA5',textDecoration:'none',fontWeight:500}}>View original ↗</a> : null}
              </div>
              <input value={tourName} onChange={e=>setTourName(e.target.value)} placeholder="Name your itinerary..." style={{border:'0.5px solid #d6d3d1',borderRadius:'6px',padding:'6px 10px',fontSize:'12px',background:'#fff',width:'100%'}}/>
            </div>
          </div>
          {/* KPI tiles */}
          <div style={{display:'grid',gridTemplateColumns:tourSource?'repeat(5,1fr)':'repeat(4,1fr)',gap:'8px'}}>
            <Card><Label>Days planned</Label><div style={metricNum}>{daysPlanned}</div><div style={metricSub}>of {duration}</div></Card>
            <Card><Label>Products added</Label><div style={metricNum}>{productsAdded}</div></Card>
            <Card><Label>Themes covered</Label><div style={metricNum}>{themeSet.size}</div><div style={metricSub}>of {THEMES.length}</div></Card>
            <Card><Label>Board alignment</Label><div style={metricNum}>{boardAlignment}%</div><div style={metricSub}>products featured by board</div></Card>
            {tourSource && <Card><Label>Source</Label><div style={{fontSize:'13px',fontWeight:600,color:'#185FA5',marginTop:'2px',wordBreak:'break-word'}}>{tourSource}</div></Card>}
          </div>
        </div>
      )}
      {view==='builder' && (
        <div style={{background:'#fff',borderBottom:'0.5px solid #e7e5e4',padding:'0 16px',display:'flex',gap:'4px'}}>
          {[['build','Build'],['consumer','Consumer Analysis']].map(([k,l])=>(
            <div key={k} onClick={()=>setBuilderSubTab(k)}
              style={{padding:'9px 12px',fontSize:'12px',fontWeight:600,cursor:'pointer',display:'flex',alignItems:'center',gap:'6px',
                borderBottom:'2px solid '+(builderSubTab===k?GREEN:'transparent'),color:builderSubTab===k?'#27500A':'#57534e'}}>
              {l}
              {k==='consumer' && daysPlanned>=2 ? <span title="Enough data for meaningful scores" style={{width:'6px',height:'6px',borderRadius:'50%',background:ACCENT,display:'inline-block'}}/> : null}
            </div>
          ))}
        </div>
      )}
      {view==='builder' && draftBanner && (
        <div style={{padding:'6px 16px',fontSize:'10px',color:'#a8a29e'}}>Opportunities → Builder</div>
      )}
      {view==='builder'
        ? (builderSubTab==='consumer'
            ? <div style={{flex:1,overflow:'auto'}}><ConsumerAnalysisView days={days} stateKey={stateKey}/></div>
            : <div style={{flex:1,display:'flex',overflow:'hidden'}}>
                <div style={{flex:'1 1 45%',minWidth:0,overflowY:'auto',padding:'14px 16px',display:'flex',flexDirection:'column',gap:'8px'}}>{renderBuilderDays()}</div>
                <div style={{flex:'1 1 55%',minWidth:'420px',overflowY:'auto',padding:'16px',display:'flex',flexDirection:'column',gap:'12px',borderLeft:'0.5px solid #e7e5e4',background:'#fafaf9'}}>{renderBuilderPanel()}</div>
              </div>)
        : <div style={{flex:1,overflow:'auto'}}>{viewBody()}</div>
      }
    </div>

    {toast? <div style={{position:'fixed',bottom:'24px',left:'50%',background:'#1c1917',color:'#fff',padding:'10px 16px',borderRadius:'8px',fontSize:'12px',boxShadow:'0 6px 24px rgba(0,0,0,.2)',animation:'toastIn .2s ease',zIndex:50}}>{toast}</div>:null}
    {renderTplPreviewModal()}
    {renderTplConfirmModal()}
  </div>);
}

// shared style fragments
const stepBtn   = {width:'26px',height:'26px',border:'0.5px solid #d6d3d1',borderRadius:'6px',background:'#f5f5f4',display:'flex',alignItems:'center',justifyContent:'center',fontSize:'16px',color:'#57534e',cursor:'pointer',userSelect:'none'};
const metricNum = {fontSize:'20px',fontWeight:600};
const metricSub = {fontSize:'10px',color:'#a8a29e',marginTop:'1px'};
const hr        = {border:'none',borderTop:'0.5px solid #e7e5e4',margin:'4px 0',width:'100%'};
const empty     = {padding:'40px 16px',textAlign:'center',color:'#a8a29e',fontSize:'13px'};
const th        = {padding:'8px 10px',fontWeight:600,color:'#57534e',borderBottom:'0.5px solid #e7e5e4',whiteSpace:'nowrap'};
const td        = {padding:'7px 10px',borderBottom:'0.5px solid #f0efed',verticalAlign:'top'};
const primaryBtn= {padding:'6px 12px',borderRadius:'6px',fontSize:'12px',fontWeight:600,background:GREEN,color:'#fff',border:'none',cursor:'pointer'};
const ghostBtn  = {padding:'6px 12px',borderRadius:'6px',fontSize:'12px',fontWeight:600,background:'#fff',color:'#57534e',border:'0.5px solid #d6d3d1',cursor:'pointer'};

// ---- boot ----
function boot(){
  const root = document.getElementById('root');
  if (!window.DATA_MODULE){
    root.innerHTML = '<div style="padding:40px;color:#8C2F1E">data.js failed to load (window.DATA_MODULE missing).</div>';
    return;
  }
  ReactDOM.createRoot(root).render(<App/>);
}
boot();
</script>
